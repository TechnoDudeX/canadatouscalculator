<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#F5EBD3"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#D4FF3A"/>

  <!-- Left accent stripe -->
  <rect x="0" y="0" width="8" height="590" fill="#0E0B2C"/>

  <!-- Logo pill -->
  <rect x="60" y="56" width="80" height="80" rx="40" fill="#0E0B2C"/>
  <text x="100" y="107" font-size="30" font-family="Georgia,serif" font-weight="700" fill="#D4FF3A" text-anchor="middle">N×S</text>

  <!-- Eyebrow -->
  <text x="160" y="88" font-size="15" font-family="system-ui,sans-serif" font-weight="600" fill="#0E0B2C" opacity="0.5" letter-spacing="0.12em">NORTH × SOUTH</text>
  <text x="160" y="112" font-size="13" font-family="system-ui,sans-serif" fill="#0E0B2C" opacity="0.4">AI-powered cross-border calculator</text>

  <!-- Main headline -->
  <text x="60" y="230" font-size="68" font-family="Georgia,serif" font-weight="800" fill="#0E0B2C" letter-spacing="-0.02em">Should you take</text>
  <text x="60" y="310" font-size="68" font-family="Georgia,serif" font-weight="800" fill="#0E0B2C" letter-spacing="-0.02em">the US offer?</text>

  <!-- Subheadline -->
  <text x="60" y="380" font-size="24" font-family="system-ui,sans-serif" fill="#0E0B2C" opacity="0.65">A cross-border honesty audit for Canadians.</text>
  <text x="60" y="412" font-size="24" font-family="system-ui,sans-serif" fill="#0E0B2C" opacity="0.65">State tax · healthcare · childcare · departure tax · TFSA traps.</text>

  <!-- Stat pills -->
  <rect x="60" y="460" width="200" height="48" rx="24" fill="#0E0B2C"/>
  <text x="160" y="490" font-size="14" font-family="system-ui,sans-serif" font-weight="700" fill="#D4FF3A" text-anchor="middle" letter-spacing="0.06em">5 QUESTIONS</text>

  <rect x="276" y="460" width="200" height="48" rx="24" fill="#FF3D7F"/>
  <text x="376" y="490" font-size="14" font-family="system-ui,sans-serif" font-weight="700" fill="#FFF6E5" text-anchor="middle" letter-spacing="0.06em">AI VERDICT</text>

  <rect x="492" y="460" width="200" height="48" rx="24" fill="#0E0B2C" opacity="0.12"/>
  <text x="592" y="490" font-size="14" font-family="system-ui,sans-serif" font-weight="700" fill="#0E0B2C" text-anchor="middle" letter-spacing="0.06em">3 MINUTES</text>

  <!-- Flags -->
  <text x="1100" y="310" font-size="100" text-anchor="middle">🇨🇦</text>
  <text x="1100" y="430" font-size="100" text-anchor="middle">🇺🇸</text>

  <!-- URL watermark -->
  <text x="60" y="618" font-size="13" font-family="system-ui,sans-serif" fill="#0E0B2C" opacity="0.5">canadatouscalculator.netlify.app</text>
