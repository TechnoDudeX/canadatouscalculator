/* ========================================================================
   PURE FUNCTIONS
   ======================================================================== */

function applyBrackets(income, brackets) {
  if (income <= 0) return 0;
  let tax = 0, lastCap = 0;
  for (const b of brackets) {
    if (income <= lastCap) break;
    const slice = Math.min(income, b.upTo) - lastCap;
    tax += slice * b.rate;
    lastCap = b.upTo;
  }
  return tax;
}

function calcOntarioSurtax(provTaxBeforeSurtax, surtax) {
  let s = 0;
  if (provTaxBeforeSurtax > surtax.tier1.threshold)
    s += (provTaxBeforeSurtax - surtax.tier1.threshold) * surtax.tier1.rate;
  if (provTaxBeforeSurtax > surtax.tier2.threshold)
    s += (provTaxBeforeSurtax - surtax.tier2.threshold) * surtax.tier2.rate;
  return s;
}

function calcOntarioHealthPremium(income) {
  if (income <= 20000) return 0;
  if (income <= 25000) return (income - 20000) * 0.06;
  if (income <= 36000) return 300;
  if (income <= 38500) return 300 + (income - 36000) * 0.06;
  if (income <= 48000) return 450;
  if (income <= 48600) return 450 + (income - 48000) * 0.25;
  if (income <= 72000) return 600;
  if (income <= 72600) return 600 + (income - 72000) * 0.25;
  if (income <= 200000) return 750;
  if (income <= 200600) return 750 + (income - 200000) * 0.25;
  return 900;
}

function calcCPP(income) {
  const base = Math.max(0, Math.min(income, CPP_2026.ympe) - CPP_2026.exemption) * CPP_2026.baseRate;
  const enhanced = Math.max(0, Math.min(income, CPP_2026.yampe) - CPP_2026.ympe) * CPP_2026.enhancedRate;
  return base + enhanced;
}

function calcEI(income) {
  return Math.min(income, EI_2026.maxInsurable) * EI_2026.rate;
}

function calculateCanada({ income, province }) {
  if (income <= 0) return { gross: 0, takeHome: 0 };
  const cpp = calcCPP(income);
  const ei = calcEI(income);
  const cppEnhanced = Math.max(0, Math.min(income, CPP_2026.yampe) - CPP_2026.ympe) * CPP_2026.enhancedRate;
  const cppBase = cpp - cppEnhanced;
  const taxableIncome = income - cppEnhanced;
  const fedTaxGross = applyBrackets(taxableIncome, CA_FEDERAL_2026);
  const fedCreditBase = (CA_BPA_2026 + cppBase + ei) * CA_FEDERAL_2026[0].rate;
  let fedTax = Math.max(0, fedTaxGross - fedCreditBase);
  const prov = PROVINCIAL_2026[province];
  if (prov.federalAbatement) fedTax = fedTax * (1 - prov.federalAbatement);
  const provTaxGross = applyBrackets(taxableIncome, prov.brackets);
  const provCredit = (prov.bpa + cppBase + ei) * prov.brackets[0].rate;
  let provTax = Math.max(0, provTaxGross - provCredit);
  if (prov.surtax) provTax += calcOntarioSurtax(provTax, prov.surtax);
  const ohp = province === 'ON' ? calcOntarioHealthPremium(income) : 0;
  const totalTax = fedTax + provTax + cpp + ei + ohp;
  return { gross: income, takeHome: income - totalTax };
}

function calcStateTax(taxable, state, filingStatus) {
  const s = STATE_2026[state];
  if (!s || s.type === 'none') return 0;
  if (s.type === 'flat') {
    let t = taxable * s.rate;
    if (s.surcharge && taxable > s.surcharge.threshold) {
      t += (taxable - s.surcharge.threshold) * s.surcharge.rate;
    }
    return t;
  }
  let t = applyBrackets(taxable, s.brackets[filingStatus]);
  if (s.mentalHealthSurcharge && taxable > s.mentalHealthSurcharge.threshold) {
    t += (taxable - s.mentalHealthSurcharge.threshold) * s.mentalHealthSurcharge.rate;
  }
  return t;
}

function calculateUS({ income, state, filingStatus, kids }) {
  if (income <= 0) return { gross: 0, takeHome: 0 };
  const stdDed = US_STD_DED_2026[filingStatus];
  const taxable = Math.max(0, income - stdDed);
  const fedGross = applyBrackets(taxable, US_FEDERAL_2026[filingStatus]);
  const fedTax = Math.max(0, fedGross - kids * CTC_2026);
  const stateTax = calcStateTax(taxable, state, filingStatus);
  const ss = Math.min(income, FICA_2026.ssWageBase) * FICA_2026.ssRate;
  const medicare = income * FICA_2026.medicareRate;
  const addlThreshold = FICA_2026.addlMedicareThreshold[filingStatus];
  const addlMedicare = Math.max(0, income - addlThreshold) * FICA_2026.addlMedicareRate;
  const totalTax = fedTax + stateTax + ss + medicare + addlMedicare;
  return { gross: income, takeHome: income - totalTax };
}

function estimateHealthcareCost(filingStatus, kids) {
  const tier = filingStatus === 'single'
    ? HEALTHCARE_2026.single
    : kids > 0 ? HEALTHCARE_2026.mfj_with_kids : HEALTHCARE_2026.mfj_no_kids;
  return tier.premium + tier.oop;
}

function buildBreakeven({ caTakeHomeCAD, usTakeHomeCAD, movingCostsCAD, years = 5 }) {
  const pts = [];
  for (let y = 0; y <= years; y++) {
    pts.push({
      year: y,
      ca: caTakeHomeCAD * y,
      us: y === 0 ? -movingCostsCAD : usTakeHomeCAD * y - movingCostsCAD
    });
  }
  let breakeven = null;
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i].us - pts[i].ca;
    const b = pts[i + 1].us - pts[i + 1].ca;
    if (a < 0 && b >= 0) {
      const t = -a / (b - a);
      breakeven = {
        year: pts[i].year + t,
        value: pts[i].ca + t * (pts[i + 1].ca - pts[i].ca)
      };
      break;
    }
  }
  return { pts, breakeven };
}

const fmtUSD = (n) => '$' + Math.round(n).toLocaleString('en-US');
const fmtSigned = (n, fmt) => (n >= 0 ? '+' : '−') + fmt(Math.abs(n));

  useEffect(() => {

    if (initialHash && initialHash !== 'changelog') {
      window.history.replaceState(null, '', window.location.pathname);
      window.scrollTo({ top: 0, behavior: 'instant' });
    }
    const onHash = () => {
      setView(window.location.hash.slice(1) === 'changelog' ? 'changelog' : 'main');
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const update = (patch) => setState(s => ({ ...s, ...patch }));

  const navigate = (toView) => {
    if (toView === 'main') {
      window.history.replaceState(null, '', window.location.pathname);
    } else {
      window.history.replaceState(null, '', '#' + toView);
    }
    setView(toView);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  const scrollToSection = (id) => {
    document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  const scrollToWizard = () => {
    if (view !== 'main') {
      window.history.replaceState(null, '', window.location.pathname);
      setView('main');
    }
    setTimeout(() => {
      document.getElementById('wizard')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);
  };

  const result = useMemo(() => {
    const ca = calculateCanada({ income: state.salaryCAD, province: state.province });
    const us = calculateUS({
      income: state.salaryUSD,
      state: state.state,
      filingStatus: state.filingStatus,
      kids: state.kids
    });
    const usHealthcare = state.salaryUSD > 0 ? estimateHealthcareCost(state.filingStatus, state.kids) : 0;
    const usChildcare = state.kids * (CHILDCARE_STATE_DEFAULT[state.state] || 22000);
    const caChildcare = state.kids * (CHILDCARE_PROV[state.province] || 3000);

    const caTakeHomeCAD = ca.takeHome - caChildcare;
    const usTakeHomeUSD = us.takeHome - usHealthcare - usChildcare;
    const usTakeHomeCAD = state.salaryUSD > 0 ? usTakeHomeUSD / state.fxRate : 0;

    const netDeltaCAD = usTakeHomeCAD - caTakeHomeCAD;

    const { pts, breakeven } = buildBreakeven({
      caTakeHomeCAD, usTakeHomeCAD, movingCostsCAD: state.movingCostsCAD, years: 5
    });
    const fiveYrDelta = pts[5].us - pts[5].ca;
    const threeYrDelta = pts[3].us - pts[3].ca;

    return {
      caTakeHomeCAD, usTakeHomeCAD, usHealthcare, usChildcare, caChildcare,
      netDeltaCAD, pts, breakeven, fiveYrDelta, threeYrDelta
    };
  }, [state]);

  if (view === 'changelog') {
    return (
      <main className="min-h-screen">
        <Header navigate={navigate} scrollToSection={scrollToSection} scrollToWizard={scrollToWizard} view={view} />
        <ChangelogView />
        <Footer />
      </main>
    );
  }

  return (
    <main className="min-h-screen">
      <Header navigate={navigate} scrollToSection={scrollToSection} scrollToWizard={scrollToWizard} view={view} />
      <Marquee />
      <Hero scrollToWizard={scrollToWizard} />

      <Wizard state={state} update={update} scrollToSection={scrollToSection} />
      <VerdictSection state={state} update={update} result={result} />
      <Footer />
    </main>
  );
}

                  <div className="space-y-6 max-w-xl">
                    <div className="flex flex-wrap gap-2">
                      {[
                        { id: 'single', label: 'Single' },
                        { id: 'mfj-no-kids', label: 'Married, no kids' },
                        { id: 'mfj-with-kids', label: 'Married, with kids' }
                      ].map(s => (
                        <button key={s.id} className={`pill ${state.familySituation === s.id ? 'active' : ''}`}
                          onClick={() => setFamily(s.id)}>
                          {s.label}
                        </button>
                      ))}
                    </div>
                    {state.familySituation === 'mfj-with-kids' && (
                      <div className="flex items-baseline gap-4">
                        <span className="label text-cream/60">Number of kids</span>
                        <input type="number" min="1" className="input-line max-w-[120px]"
                          value={state.kids || 1}
                          onChange={e => update({ kids: parseInt(e.target.value) || 1 })}/>
                      </div>
                    )}
                  </div>
                )}
              </div>

              <div className="mt-12 flex items-center justify-between gap-4 pt-7 border-t border-cream/10">
                <button onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0}
                  className="label text-cream/60 hover:text-cream disabled:opacity-30">
                  ← Back
                </button>
                <button onClick={handleNext} className="btn-primary">
                  {step === steps.length - 1 ? 'See the verdict →' : 'Next →'}
                </button>
              </div>
            </div>

            <div className="mt-8 flex justify-center gap-2">
              {steps.map((_, i) => (
                <button key={i} onClick={() => setStep(i)}
                  className={`h-2 rounded-full transition-all ${i === step ? 'bg-lime w-8' : i < step ? 'bg-cream/40 w-2' : 'bg-cream/15 w-2'}`}/>
              ))}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ============================================================
   VERDICT — Section 3
   ============================================================ */
function VerdictSection({ state, update, result }) {
  const hasInput = state.salaryCAD > 0 && state.salaryUSD > 0;
  const fiveYrDelta = result.fiveYrDelta;
  const threeYrDelta = result.threeYrDelta;

  const familyLabel =
    state.familySituation === 'single' ? 'single' :
    state.familySituation === 'mfj-no-kids' ? 'married, no kids' :
    `married + ${state.kids} kid${state.kids === 1 ? '' : 's'}`;

  const inputSummary = hasInput
    ? `based on your inputs · ${fmtCAD(state.salaryCAD)} ${PROVINCIAL_2026[state.province].short} → $${state.salaryUSD.toLocaleString('en-US')} ${STATE_2026[state.state].short} · ${familyLabel}`
    : 'based on your inputs · run the wizard above';

  let verdictTitle = 'Plan survives — barely.';
  let verdictBody = 'Worth it if you stay 4+ years and resist lifestyle drift.';
  let verdictColor = 'lime';
  if (!hasInput) {
    verdictTitle = 'Verdict pending.';
    verdictBody = 'Answer five quick questions above to see whether the plan holds up.';
    verdictColor = 'cream';
  } else if (fiveYrDelta < 0) {
    verdictTitle = 'Plan breaks down.';
    verdictBody = 'On these inputs, the move costs you money over 5 years. Negotiate higher or stay.';
    verdictColor = 'pink';
  } else if (fiveYrDelta > 400000) {
    verdictTitle = 'Plan crushes it.';
    verdictBody = 'Strong delta — even with lifestyle drift, the move pays off comfortably.';
    verdictColor = 'lime';

  const verdictClass =
    verdictColor === 'lime' ? 'panel-lime' :
    verdictColor === 'pink' ? 'panel-pink' :
    'panel-cream';

  return (
    <section id="verdict" className="border-t border-cream/10">
      <div className="max-w-[1280px] mx-auto px-6 md:px-10 py-20 md:py-28">

        <div className="grid md:grid-cols-12 gap-10 mb-14">

            <div className="flex items-center gap-3 mb-5 flex-wrap">

              <span className="grotesk text-cream/60 text-sm">{inputSummary}</span>
            </div>
            {hasInput ? (
              <h3 className="display text-[clamp(2.25rem,5.5vw,4.5rem)] font-bold leading-[0.96] text-cream tracking-tight">
                Stay <span className="hl-lime">five years</span>, you come home roughly{' '}
                <span className={fiveYrDelta >= 0 ? 'text-lime' : 'text-pink'}>{fmtCAD(Math.abs(fiveYrDelta))}</span>{' '}
                {fiveYrDelta >= 0 ? 'ahead.' : 'behind.'}

              <h3 className="display text-[clamp(2rem,4.5vw,3.75rem)] font-bold leading-[1.02] text-cream/70 tracking-tight italic">
                Answer the wizard above, and your verdict shows up here.

            {hasInput && (

                In reality, expect 50–70% of that. Here's the year-by-year so you can see when the move actually pays off.
              </p>

          <div className="md:col-span-5 flex md:justify-end items-start">
            <div className={`floating-tag ${verdictClass} p-6 md:p-7 max-w-xs`}>
              <div className="grotesk font-bold text-xs tracking-widest uppercase mb-3 opacity-70">Verdict</div>
              <div className="display text-2xl md:text-3xl font-bold leading-tight">{verdictTitle}</div>
              <div className="grotesk text-sm mt-3 opacity-80">{verdictBody}</div>
            </div>
          </div>
        </div>

        <div className="grid md:grid-cols-4 gap-4 md:gap-5 mb-14">
          <StatBlock kicker="Pays for itself in"
            value={result.breakeven ? `Year ${result.breakeven.year.toFixed(1)}` : (hasInput ? 'Never' : '—')}
            detail={result.breakeven ? 'when cumulative US take-home overtakes staying' : (hasInput ? "US doesn't catch CA in 5 yrs" : 'awaiting your inputs')}
            color="cobalt"/>
          <StatBlock kicker="3-year nest egg"
            value={hasInput ? fmtSigned(threeYrDelta, fmtCAD) : '—'}
            detail="if you come home after 3 years"
            color="cream"/>
          <StatBlock kicker="5-year nest egg"
            value={hasInput ? fmtSigned(fiveYrDelta, fmtCAD) : '—'}
            detail="if you stick the full detour"
            color="lime"/>
          <StatBlock kicker="Exit cost"
            value={fmtCAD(state.movingCostsCAD)}
            detail="moving + immigration + departure tax"
            color="pink"
            editable
            onEdit={(v) => update({ movingCostsCAD: v })}

        <div className="panel p-6 md:p-10">
          <div className="flex items-baseline justify-between mb-6 flex-wrap gap-3">
            <h4 className="grotesk font-bold text-cream text-xl">Cumulative take-home, 5 years</h4>

            <RealityCheck n="03" headline="Re-entry FX risk" body="Coming home means a CAD mortgage on USD savings. Currency moves against you."/>
          </div>

function StatBlock({ kicker, value, detail, color, editable, onEdit, editValue }) {
  const [editing, setEditing] = useState(false);
  const cls = color === 'lime' ? 'panel-lime' : color === 'pink' ? 'panel-pink' : color === 'cobalt' ? 'panel-cobalt' : 'panel-cream';
  return (
    <div className={`${cls} p-6 md:p-7`}>
      <div className="flex items-baseline justify-between mb-4">
        <span className="grotesk font-bold text-xs uppercase tracking-widest opacity-70">{kicker}</span>
        {editable && !editing && (
          <button onClick={() => setEditing(true)} className="grotesk text-xs uppercase tracking-widest opacity-60 hover:opacity-100">
            edit
          </button>
        )}
      </div>
      {editing ? (
        <div className="flex items-baseline gap-2">
          <span className="num text-2xl opacity-60">$</span>
          <input
            type="number"
            autoFocus
            className="bg-transparent border-b-2 outline-none stat-num text-[34px] md:text-[42px] leading-none w-full"
            style={{ borderColor: 'currentColor' }}
            value={editValue || 0}
            onChange={e => onEdit(parseInt(e.target.value) || 0)}
            onBlur={() => setEditing(false)}
            onKeyDown={e => { if (e.key === 'Enter') setEditing(false); }}
          />
        </div>
      ) : (
        <div className="stat-num text-[34px] md:text-[42px] leading-none mb-3">{value}</div>
      )}
      <div className="grotesk text-xs leading-snug opacity-75 mt-3">{detail}</div>
    </div>
  );
}

function RealityCheck({ n, headline, body }) {
  return (
    <div className="panel p-6">

function LegendDot({ color, label, filled }) {
  return (
    <div className="flex items-center gap-2">
      {filled

        : <svg width="22" height="6"><line x1="0" y1="3" x2="22" y2="3" stroke={color} strokeWidth="3" strokeLinecap="round"/></svg>}

/* ============================================================
   CHART
   ============================================================ */
function BreakevenChart({ pts, breakeven, years, hasInput }) {
  const w = 880, h = 380;
  const padL = 70, padT = 24, padR = 30, padB = 50;
  const plotW = w - padL - padR, plotH = h - padT - padB;

  const allVals = pts.flatMap(p => [p.ca, p.us]);
  let yMin = Math.min(0, ...allVals);
  let yMax = Math.max(...allVals);
  if (!hasInput) { yMin = -50000; yMax = 800000; }
  const yRange = (yMax - yMin) || 1;
  const xS = y => padL + (y / years) * plotW;
  const yS = v => padT + plotH - ((v - yMin) / yRange) * plotH;

  const caPath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xS(p.year)} ${yS(p.ca)}`).join(' ');
  const usPath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xS(p.year)} ${yS(p.us)}`).join(' ');

  const tickStep = yRange > 1500000 ? 500000 : yRange > 600000 ? 200000 : yRange > 200000 ? 100000 : 50000;
  const yTicks = [];
  for (let v = Math.floor(yMin / tickStep) * tickStep; v <= yMax + 1; v += tickStep) yTicks.push(v);

  const fmtTick = v => {
    if (v === 0) return '$0';
    const sign = v < 0 ? '−' : '';
    const abs = Math.abs(v);
    if (abs >= 1000000) return sign + '$' + (abs / 1000000).toFixed(1) + 'M';
    return sign + '$' + Math.round(abs / 1000) + 'k';
  };

  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto" preserveAspectRatio="xMidYMid meet">
      {yTicks.map(v => (
        <g key={v}>
          <line x1={padL} y1={yS(v)} x2={padL + plotW} y2={yS(v)}
            stroke="#FFF6E5" strokeWidth="1" opacity={v === 0 ? 0.45 : 0.08}
            strokeDasharray={v === 0 ? '' : '2 4'}/>
          <text x={padL - 10} y={yS(v) + 4} textAnchor="end" fontSize="11"
            fill="#FFF6E5" opacity="0.5" fontFamily="Geist Mono">{fmtTick(v)}</text>
        </g>
      ))}
      {pts.map(p => (
        <text key={p.year} x={xS(p.year)} y={padT + plotH + 22} textAnchor="middle" fontSize="11"
          fill="#FFF6E5" opacity="0.5" fontFamily="Space Grotesk">Y{p.year}</text>
      ))}

      {hasInput && (
        <>
          <path d={`${caPath} L ${xS(years)} ${yS(0)} L ${xS(0)} ${yS(0)} Z`} fill="#D4FF3A" fillOpacity="0.08"/>
          <path d={`${usPath} L ${xS(years)} ${yS(0)} L ${xS(0)} ${yS(0)} Z`} fill="#FF3D7F" fillOpacity="0.10"/>
          <path d={caPath} fill="none" stroke="#D4FF3A" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round"/>
          <path d={usPath} fill="none" stroke="#FF3D7F" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round"/>
          {pts.map(p => (
            <g key={'d'+p.year}>
              <circle cx={xS(p.year)} cy={yS(p.ca)} r="4.5" fill="#D4FF3A" stroke="#0E0B2C" strokeWidth="2"/>
              <circle cx={xS(p.year)} cy={yS(p.us)} r="4.5" fill="#FF3D7F" stroke="#0E0B2C" strokeWidth="2"/>
            </g>
          ))}
        </>
      )}

      {!hasInput && (
        <text x={padL + plotW / 2} y={padT + plotH / 2} textAnchor="middle"
          fontSize="18" fill="#FFF6E5" opacity="0.4" fontFamily="Space Grotesk">
          your year-by-year shows up here once you fill in the wizard
        </text>
      )}

      {breakeven && (
        <g>
          <line x1={xS(breakeven.year)} y1={padT} x2={xS(breakeven.year)} y2={padT + plotH}
            stroke="#FFF6E5" strokeWidth="1.5" strokeDasharray="4 5" opacity="0.7"/>
          <circle cx={xS(breakeven.year)} cy={yS(breakeven.value)} r="9" fill="#FFF6E5" stroke="#0E0B2C" strokeWidth="3"/>
          <g transform={`translate(${xS(breakeven.year) + 16}, ${yS(breakeven.value) - 30})`}>
            <rect x="0" y="-18" width="148" height="26" rx="13" fill="#FFF6E5"/>
            <text x="74" y="-1" textAnchor="middle" fontSize="11" fill="#0E0B2C"
              fontFamily="Space Grotesk" fontWeight="700" letterSpacing="0.1em">
              BREAKEVEN · YR {breakeven.year.toFixed(1)}
            </text>
          </g>
        </g>
      )}

      {hasInput && (
        <>
          <text x={xS(years) - 6} y={yS(pts[years].ca) - 14} textAnchor="end"
            fontSize="13" fill="#D4FF3A" fontFamily="Space Grotesk" fontWeight="700">
            Stay in Canada
          </text>
          <text x={xS(years) - 6} y={yS(pts[years].us) - 14} textAnchor="end"
            fontSize="13" fill="#FF3D7F" fontFamily="Space Grotesk" fontWeight="700">
            Move to US
          </text>
        </>
      )}
    </svg>
  );
}
