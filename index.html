/* ========================================================================
   PURE FUNCTIONS
   ======================================================================== */

function applyBrackets(income, brackets) {
  if (income <= 0) return 0;
  let tax = 0, lastCap = 0;
  for (const b of brackets) {
    if (income <= lastCap) break;
    const slice = Math.min(income, b.upTo) - lastCap;
    tax += slice * b.rate;
    lastCap = b.upTo;
  }
  return tax;
}

function marginalRate(income, brackets) {
  for (const b of brackets) if (income <= b.upTo) return b.rate;
  return brackets[brackets.length - 1].rate;
}

function calcOntarioSurtax(provTaxBeforeSurtax, surtax) {
  let s = 0;
  if (provTaxBeforeSurtax > surtax.tier1.threshold)
    s += (provTaxBeforeSurtax - surtax.tier1.threshold) * surtax.tier1.rate;
  if (provTaxBeforeSurtax > surtax.tier2.threshold)
    s += (provTaxBeforeSurtax - surtax.tier2.threshold) * surtax.tier2.rate;
  return s;
}

function calcOntarioHealthPremium(income) {
  if (income <= 20000) return 0;
  if (income <= 25000) return (income - 20000) * 0.06;
  if (income <= 36000) return 300;
  if (income <= 38500) return 300 + (income - 36000) * 0.06;
  if (income <= 48000) return 450;
  if (income <= 48600) return 450 + (income - 48000) * 0.25;
  if (income <= 72000) return 600;
  if (income <= 72600) return 600 + (income - 72000) * 0.25;
  if (income <= 200000) return 750;
  if (income <= 200600) return 750 + (income - 200000) * 0.25;
  return 900;
}

function calcCPP(income) {
  const base = Math.max(0, Math.min(income, CPP_2026.ympe) - CPP_2026.exemption) * CPP_2026.baseRate;
  const enhanced = Math.max(0, Math.min(income, CPP_2026.yampe) - CPP_2026.ympe) * CPP_2026.enhancedRate;
  return base + enhanced;
}

function calcEI(income) {
  return Math.min(income, EI_2026.maxInsurable) * EI_2026.rate;
}

function calculateCanada({ income, province }) {
  const cpp = calcCPP(income);
  const ei = calcEI(income);
  // CPP enhanced (the 4% on YAMPE-YMPE) is deductible from income.
  // CPP base + EI premiums generate non-refundable credits at the lowest fed/prov rate.
  const cppEnhanced = Math.max(0, Math.min(income, CPP_2026.yampe) - CPP_2026.ympe) * CPP_2026.enhancedRate;
  const cppBase = cpp - cppEnhanced;
  const taxableIncome = income - cppEnhanced;

  const fedTaxGross = applyBrackets(taxableIncome, CA_FEDERAL_2026);
  const fedCreditBase = (CA_BPA_2026 + cppBase + ei) * CA_FEDERAL_2026[0].rate;
  let fedTax = Math.max(0, fedTaxGross - fedCreditBase);

  const prov = PROVINCIAL_2026[province];
  if (prov.federalAbatement) fedTax = fedTax * (1 - prov.federalAbatement);

  const provTaxGross = applyBrackets(taxableIncome, prov.brackets);
  const provCredit = (prov.bpa + cppBase + ei) * prov.brackets[0].rate;
  let provTax = Math.max(0, provTaxGross - provCredit);
  if (prov.surtax) provTax += calcOntarioSurtax(provTax, prov.surtax);

  const ohp = province === 'ON' ? calcOntarioHealthPremium(income) : 0;

  const totalTax = fedTax + provTax + cpp + ei + ohp;
  const fedMarginal = marginalRate(taxableIncome, CA_FEDERAL_2026);
  const provMarginal = marginalRate(taxableIncome, prov.brackets);

  return {
    gross: income,
    federalTax: fedTax,
    subnationalTax: provTax,
    payrollTax: cpp + ei,
    healthPremium: ohp,
    totalTax,
    takeHome: income - totalTax,
    marginal: fedMarginal + provMarginal
  };
}

function calcStateTax(taxable, state, filingStatus) {
  const s = STATE_2026[state];
  if (!s || s.type === 'none') return 0;
  if (s.type === 'flat') {
    let t = taxable * s.rate;
    if (s.surcharge && taxable > s.surcharge.threshold) {
      t += (taxable - s.surcharge.threshold) * s.surcharge.rate;
    }
    return t;
  }
  let t = applyBrackets(taxable, s.brackets[filingStatus]);
  if (s.mentalHealthSurcharge && taxable > s.mentalHealthSurcharge.threshold) {
    t += (taxable - s.mentalHealthSurcharge.threshold) * s.mentalHealthSurcharge.rate;
  }
  return t;
}

function calculateUS({ income, state, filingStatus, kids, includeNYC }) {
  const stdDed = US_STD_DED_2026[filingStatus];
  const taxable = Math.max(0, income - stdDed);
  const fedGross = applyBrackets(taxable, US_FEDERAL_2026[filingStatus]);
  const fedTax = Math.max(0, fedGross - kids * CTC_2026);

  let stateTax = calcStateTax(taxable, state, filingStatus);
  if (state === 'NY' && includeNYC) {
    stateTax += applyBrackets(taxable, STATE_2026.NY.nycAddon[filingStatus]);
  }

  const ss = Math.min(income, FICA_2026.ssWageBase) * FICA_2026.ssRate;
  const medicare = income * FICA_2026.medicareRate;
  const addlThreshold = FICA_2026.addlMedicareThreshold[filingStatus];
  const addlMedicare = Math.max(0, income - addlThreshold) * FICA_2026.addlMedicareRate;

  const totalTax = fedTax + stateTax + ss + medicare + addlMedicare;
  const fedMarginal = marginalRate(taxable, US_FEDERAL_2026[filingStatus]);
  const stateMarginal = STATE_2026[state].type === 'flat'
    ? STATE_2026[state].rate
    : STATE_2026[state].type === 'none'
      ? 0
      : marginalRate(taxable, STATE_2026[state].brackets[filingStatus]);

  return {
    gross: income,
    federalTax: fedTax,
    subnationalTax: stateTax,
    payrollTax: ss + medicare + addlMedicare,
    totalTax,
    takeHome: income - totalTax,
    marginal: fedMarginal + stateMarginal
  };
}

function estimateHealthcareCost(filingStatus, kids) {
  const tier = filingStatus === 'single'
    ? HEALTHCARE_2026.single
    : kids > 0 ? HEALTHCARE_2026.mfj_with_kids : HEALTHCARE_2026.mfj_no_kids;
  return tier.premium + tier.oop;
}

function fvOfAnnuity(annual, years, rate) {
  if (rate === 0) return annual * years;
  return annual * (Math.pow(1 + rate, years) - 1) / rate;
}

/* ========================================================================
   FORMATTERS & URL STATE
   ======================================================================== */

const fmtCAD = (n) => '$' + Math.round(n).toLocaleString('en-CA');
const fmtUSD = (n) => '$' + Math.round(n).toLocaleString('en-US');
const fmtPct = (n) => (n * 100).toFixed(1) + '%';
const fmtSigned = (n, fmt) => (n >= 0 ? '+' : '−') + fmt(Math.abs(n));

function readURL() {
  const p = new URLSearchParams(window.location.search);
  return {
    salaryCAD: parseInt(p.get('cad')) || 145000,
    salaryUSD: parseInt(p.get('usd')) || 215000,
    province: p.get('from') || 'ON',
    state: p.get('to') || 'CA',
    filingStatus: p.get('fs') || 'single',
    kids: parseInt(p.get('kids')) || 0,
    visaType: p.get('visa') || 'TN',
    fxRate: parseFloat(p.get('fx')) || 0.73,
    nyc: p.get('nyc') === '1',
    movingCostsCAD: parseInt(p.get('mc')) || 25000
  };
}
function writeURL(s) {
  const p = new URLSearchParams();
  p.set('cad', s.salaryCAD); p.set('usd', s.salaryUSD);
  p.set('from', s.province); p.set('to', s.state);
  p.set('fs', s.filingStatus); p.set('kids', s.kids);
  p.set('visa', s.visaType); p.set('fx', s.fxRate);
  p.set('mc', s.movingCostsCAD);
  if (s.nyc) p.set('nyc', '1');
  window.history.replaceState({}, '', '?' + p.toString());
}

function niceStep(rough) {
  if (rough <= 0) return 1;
  const exp = Math.floor(Math.log10(rough));
  const base = Math.pow(10, exp);
  const r = rough / base;
  const nice = r < 1.5 ? 1 : r < 3 ? 2 : r < 7 ? 5 : 10;
  return nice * base;
}

function buildBreakeven({ caTakeHomeCAD, usTakeHomeCAD, movingCostsCAD, years = 5 }) {
  const pts = [];
  for (let y = 0; y <= years; y++) {
    pts.push({
      year: y,
      ca: caTakeHomeCAD * y,
      us: y === 0 ? -movingCostsCAD : (usTakeHomeCAD * y) - movingCostsCAD
    });
  }
  let breakeven = null;
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i].us - pts[i].ca;
    const b = pts[i + 1].us - pts[i + 1].ca;
    if (a < 0 && b >= 0) {
      const t = -a / (b - a);
      breakeven = {
        year: pts[i].year + t,
        value: pts[i].ca + t * (pts[i + 1].ca - pts[i].ca)
      };
      break;
    }
  }
  return { pts, breakeven };
}

  useEffect(() => { writeURL(state); }, [state]);

  const update = (patch) => setState(s => ({ ...s, ...patch }));

  const result = useMemo(() => {
    const ca = calculateCanada({ income: state.salaryCAD, province: state.province });
    const us = calculateUS({
      income: state.salaryUSD,
      state: state.state,
      filingStatus: state.filingStatus,
      kids: state.kids,
      includeNYC: state.nyc
    });
    const usHealthcare = estimateHealthcareCost(state.filingStatus, state.kids);
    const usChildcare = state.kids * (CHILDCARE_STATE_DEFAULT[state.state] || 22000);
    const caChildcare = state.kids * (CHILDCARE_PROV[state.province] || 3000);

    const caTakeHomeCAD = ca.takeHome - caChildcare;
    const usTakeHomeUSD = us.takeHome - usHealthcare - usChildcare;
    const usTakeHomeCAD = usTakeHomeUSD / state.fxRate;

    const grossDeltaCAD = (state.salaryUSD / state.fxRate) - state.salaryCAD;
    const netDeltaCAD = usTakeHomeCAD - caTakeHomeCAD;

    const projection = fvOfAnnuity(Math.max(0, netDeltaCAD), 10, 0.07);

    return {
      ca, us,
      usHealthcare, usChildcare, caChildcare,
      caTakeHomeCAD, usTakeHomeUSD, usTakeHomeCAD,
      grossDeltaCAD, netDeltaCAD, projection
    };
  }, [state]);

  const copyShare = useCallback(() => {
    navigator.clipboard.writeText(window.location.href);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  }, []);

  const warnings = useMemo(() => buildWarnings(state), [state]);

  return (

  );
}

function BreakevenChart({ pts, breakeven, years }) {
  const w = 800, h = 440;
  const padL = 88, padT = 30, padR = 40, padB = 50;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  const allVals = pts.flatMap(p => [p.ca, p.us]);
  const rawMin = Math.min(0, ...allVals);
  const rawMax = Math.max(...allVals);
  const tickStep = niceStep((rawMax - rawMin) / 5);
  const yMin = Math.floor(rawMin / tickStep) * tickStep;
  const yMax = Math.ceil(rawMax / tickStep) * tickStep;
  const yRange = (yMax - yMin) || 1;

  const xScale = (year) => padL + (year / years) * plotW;
  const yScale = (val) => padT + plotH - ((val - yMin) / yRange) * plotH;

  const caPath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xScale(p.year)} ${yScale(p.ca)}`).join(' ');
  const usPath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xScale(p.year)} ${yScale(p.us)}`).join(' ');

  const areaPath = [
    ...pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xScale(p.year)} ${yScale(p.us)}`),
    ...pts.slice().reverse().map(p => `L ${xScale(p.year)} ${yScale(p.ca)}`),
    'Z'
  ].join(' ');

  const yTicks = [];
  for (let v = yMin; v <= yMax + 0.0001; v += tickStep) yTicks.push(Math.round(v));

  const fmtTick = (v) => {
    if (Math.abs(v) >= 1000) return (v >= 0 ? '$' : '−$') + Math.abs(Math.round(v / 1000)) + 'k';
    return (v >= 0 ? '$' : '−$') + Math.abs(v);
  };

  const final = pts[pts.length - 1];
  const usFinalAbove = final.us > final.ca;

  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto" preserveAspectRatio="xMidYMid meet">
      <rect x={padL} y={padT} width={plotW} height={plotH} fill="#FBF6EC" />

      {yTicks.map(v => (
        <g key={v}>
          <line x1={padL} y1={yScale(v)} x2={padL + plotW} y2={yScale(v)} stroke="#D9D0B8" strokeWidth="1" />
          <text x={padL - 12} y={yScale(v) + 4} textAnchor="end" fontSize="11" fill="#8A8475" fontFamily="Geist Mono">
            {fmtTick(v)}
          </text>
        </g>
      ))}

      <line x1={padL} y1={yScale(0)} x2={padL + plotW} y2={yScale(0)} stroke="#1A1815" strokeWidth="1.5" />

      <path d={areaPath} fill={usFinalAbove ? '#2F4A2C' : '#C8421F'} fillOpacity="0.07" />

      <path d={caPath} fill="none" stroke="#2F4A2C" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      <path d={usPath} fill="none" stroke="#C8421F" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />

      {pts.map(p => (
        <g key={p.year}>
          <circle cx={xScale(p.year)} cy={yScale(p.ca)} r="3.5" fill="#2F4A2C" />
          <circle cx={xScale(p.year)} cy={yScale(p.us)} r="3.5" fill="#C8421F" />
          <line x1={xScale(p.year)} y1={padT + plotH} x2={xScale(p.year)} y2={padT + plotH + 5} stroke="#1A1815" strokeWidth="1" />
          <text x={xScale(p.year)} y={padT + plotH + 22} textAnchor="middle" fontSize="11" fill="#8A8475" fontFamily="Geist">
            Year {p.year}
          </text>
        </g>
      ))}

      {breakeven && (
        <g>
          <line
            x1={xScale(breakeven.year)} y1={padT}
            x2={xScale(breakeven.year)} y2={padT + plotH}
            stroke="#9D2F12" strokeWidth="1" strokeDasharray="4 4" opacity="0.6"
          />
          <circle cx={xScale(breakeven.year)} cy={yScale(breakeven.value)} r="6" fill="#9D2F12" stroke="#F5F0E6" strokeWidth="2" />
          <rect
            x={xScale(breakeven.year) - 56} y={padT - 26}
            width="112" height="22" fill="#9D2F12"

          <text
            x={xScale(breakeven.year)} y={padT - 11}

}

}

/* ========================================================================
   WIZARD — screen-by-screen guided flow
   ======================================================================== */

function Wizard({ state, update, onComplete }) {
  const [stepIdx, setStepIdx] = useState(0);

  const allSteps = ['salaryCAD','province','salaryUSD','state','nyc','filingStatus','kids','visaType','review'];
  const visibleSteps = allSteps.filter(s => s !== 'nyc' || state.state === 'NY');
  const safeIdx = Math.min(stepIdx, visibleSteps.length - 1);
  const current = visibleSteps[safeIdx];
  const total = visibleSteps.length;

  const next = () => safeIdx < total - 1 ? setStepIdx(safeIdx + 1) : onComplete();
  const back = () => setStepIdx(Math.max(0, safeIdx - 1));

  const choose = (field, value) => {
    update({ [field]: value });
    setTimeout(() => setStepIdx(i => Math.min(i + 1, allSteps.length - 1)), 180);
  };

  return (
    <section>
      <div className="max-w-3xl mx-auto px-6 pt-12 pb-24">
        {/* Progress */}
        <div className="flex items-center gap-4 mb-16">
          <div className="label whitespace-nowrap">Step {safeIdx + 1} of {total}</div>
          <div className="flex-1 h-px bg-cream-line relative">
            <div className="absolute inset-y-0 left-0 bg-ink transition-all duration-300" style={{ width: `${((safeIdx + 1) / total) * 100}%` }} />
          </div>
        </div>

        {current === 'salaryCAD' && (
          <NumberScreen
            title="How much do you earn now?"
            subtitle="Annual base salary in Canadian dollars, before tax."
            value={state.salaryCAD}
            onChange={(v) => update({ salaryCAD: v })}
            prefix="$" suffix="CAD"
            onNext={next} onBack={back}
          />
        )}

        {current === 'province' && (
          <ChoiceScreen
            title="Where in Canada?"
            subtitle="The province you currently file taxes in."
            value={state.province}
            options={Object.entries(PROVINCIAL_2026).map(([k, v]) => ({ value: k, label: v.label }))}
            onChoose={(v) => choose('province', v)}
            onBack={back}
            columns={2}
          />
        )}

        {current === 'salaryUSD' && (
          <NumberScreen
            title="What's the offer?"
            subtitle="Base salary in USD. Leave bonus and RSUs out for now — those land in v2."
            value={state.salaryUSD}
            onChange={(v) => update({ salaryUSD: v })}
            prefix="$" suffix="USD"
            onNext={next} onBack={back}
          />
        )}

        {current === 'state' && (
          <ChoiceScreen
            title="Going where?"
            subtitle="Which US state. State tax swing alone can move the answer by tens of thousands — Texas and Florida have none, California tops out near 13%."
            value={state.state}
            options={Object.entries(STATE_2026).map(([k, v]) => ({ value: k, label: v.label }))}
            onChoose={(v) => choose('state', v)}
            onBack={back}
            columns={2}
          />
        )}

        {current === 'nyc' && (
          <ChoiceScreen
            title="Living in NYC proper?"
            subtitle="New York City charges its own personal income tax on top of the state. The five boroughs count, the suburbs do not."
            value={state.nyc ? 'yes' : 'no'}
            options={[
              { value: 'no', label: 'No, outside the city' },
              { value: 'yes', label: 'Yes, in NYC' }
            ]}
            onChoose={(v) => choose('nyc', v === 'yes')}
            onBack={back}
          />
        )}

        {current === 'filingStatus' && (
          <ChoiceScreen
            title="Filing status?"
            subtitle="Married filing jointly matters in the US — wider brackets, doubled standard deduction. Common-law and married are treated the same on Canadian returns."
            value={state.filingStatus}
            options={[
              { value: 'single', label: 'Single' },
              { value: 'mfj', label: 'Married, filing jointly' }
            ]}
            onChoose={(v) => choose('filingStatus', v)}
            onBack={back}
          />
        )}

        {current === 'kids' && (
          <ChoiceScreen
            title="Kids under 13?"
            subtitle="Childcare is the line item that flips this calculation for families. Toronto's $10/day under CWELCC versus $20–30k a year per kid in most US metros."
            value={state.kids}
            options={[
              { value: 0, label: 'None' },
              { value: 1, label: '1' },
              { value: 2, label: '2' },
              { value: 3, label: '3 or more' }
            ]}
            onChoose={(v) => choose('kids', v)}
            onBack={back}
            columns={2}
          />
        )}

        {current === 'visaType' && (
          <ChoiceScreen
            title="Which visa?"
            subtitle="TN is the easy path for Canadian professionals but doesn't lead to a green card. H1B does, but it's lottery-based and has strict spouse rules."
            value={state.visaType}
            options={[
              { value: 'TN', label: 'TN — Canadian professional' },
              { value: 'H1B', label: 'H1B' },
              { value: 'GC', label: 'Already a green card holder' }
            ]}
            onChoose={(v) => choose('visaType', v)}
            onBack={back}
          />
        )}

        {current === 'review' && (
          <ReviewScreen state={state} onNext={onComplete} onBack={back} />
        )}
      </div>
    </section>
  );
}

function WizardScreen({ title, subtitle, onNext, ctaLabel = 'Continue', onBack, hideBack }) {
  return (
    <div>
      <h1 className="display text-5xl md:text-7xl font-medium leading-[0.95] tracking-tight mb-8">{title}</h1>
      {subtitle && <p className="text-lg text-ink-soft max-w-xl leading-relaxed mb-12">{subtitle}</p>}
      <div className="flex items-center gap-6">
        <button className="cta" onClick={onNext}>{ctaLabel}</button>
        {!hideBack && <button onClick={onBack} className="text-sm text-ink-soft underline-offset-4 hover:underline">Back</button>}
      </div>
    </div>
  );
}

function NumberScreen({ title, subtitle, value, onChange, prefix, suffix, onNext, onBack }) {
  const handleKey = (e) => { if (e.key === 'Enter') onNext(); };
  return (
    <div>
      <h2 className="display text-4xl md:text-6xl font-medium leading-tight tracking-tight mb-6">{title}</h2>
      {subtitle && <p className="text-base md:text-lg text-ink-soft max-w-xl leading-relaxed mb-12">{subtitle}</p>}
      <div className="flex items-baseline gap-3 mb-12 max-w-md">
        {prefix && <span className="num text-3xl md:text-4xl text-ink-faint">{prefix}</span>}
        <input
          type="number"
          autoFocus
          className="input-field"
          style={{ fontSize: '2.25rem', fontWeight: 500 }}
          value={value || ''}
          onChange={(e) => onChange(parseInt(e.target.value) || 0)}
          onFocus={(e) => e.target.select()}
          onKeyDown={handleKey}
        />
        {suffix && <span className="num text-lg md:text-xl text-ink-faint">{suffix}</span>}
      </div>
      <div className="flex items-center gap-6">
        <button className="cta" onClick={onNext}>Continue</button>
        <button onClick={onBack} className="text-sm text-ink-soft underline-offset-4 hover:underline">Back</button>
      </div>
    </div>
  );
}

function ChoiceScreen({ title, subtitle, value, options, onChoose, onBack, columns = 1 }) {
  const colClass = columns === 2 ? 'grid-cols-1 sm:grid-cols-2' : 'grid-cols-1';
  return (
    <div>
      <h2 className="display text-4xl md:text-6xl font-medium leading-tight tracking-tight mb-6">{title}</h2>
      {subtitle && <p className="text-base md:text-lg text-ink-soft max-w-xl leading-relaxed mb-12">{subtitle}</p>}
      <div className={`grid ${colClass} gap-3 max-w-2xl mb-12`}>
        {options.map((opt) => {
          const selected = value === opt.value;
          return (
            <button
              key={String(opt.value)}
              onClick={() => onChoose(opt.value)}
              className={`text-left px-5 py-4 border transition-all ${selected ? 'border-ink bg-ink text-cream' : 'border-cream-line hover:border-ink hover:bg-cream-deep'}`}
            >
              <span className="font-medium">{opt.label}</span>
            </button>
          );
        })}
      </div>
      <div>
        <button onClick={onBack} className="text-sm text-ink-soft underline-offset-4 hover:underline">Back</button>
      </div>
    </div>
  );
}

function ReviewScreen({ state, onNext, onBack }) {
  const Row = ({ label, value }) => (
    <div className="flex justify-between items-baseline py-3 border-b border-cream-line last:border-b-0">
      <span className="label">{label}</span>
      <span className="num font-medium text-right">{value}</span>
    </div>
  );
  return (
    <div>
      <h2 className="display text-4xl md:text-6xl font-medium leading-tight tracking-tight mb-6">Ready to see the math?</h2>
      <p className="text-base md:text-lg text-ink-soft max-w-xl leading-relaxed mb-10">
        Here's what you've told us. You can change any of this on the next screen.
      </p>
      <div className="border border-cream-line p-6 mb-10 max-w-xl">
        <Row label="Current salary" value={`${fmtCAD(state.salaryCAD)} CAD`} />
        <Row label="Province" value={PROVINCIAL_2026[state.province].label} />
        <Row label="Offer" value={`${fmtUSD(state.salaryUSD)} USD`} />
        <Row label="State" value={STATE_2026[state.state].label + (state.state === 'NY' && state.nyc ? ' (NYC)' : '')} />
        <Row label="Filing" value={state.filingStatus === 'single' ? 'Single' : 'Married, joint'} />
        <Row label="Kids" value={state.kids === 0 ? 'None' : state.kids === 3 ? '3 or more' : String(state.kids)} />
        <Row label="Visa" value={state.visaType === 'GC' ? 'Green Card' : state.visaType} />
      </div>
      <div className="flex items-center gap-6">
        <button className="cta" onClick={onNext}>Show me the number</button>
        <button onClick={onBack} className="text-sm text-ink-soft underline-offset-4 hover:underline">Back</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
