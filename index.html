<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* Tax data (CA_FEDERAL_2026, PROVINCIAL_2026, CPP_2026, EI_2026, US_FEDERAL_2026,
   US_STD_DED_2026, CTC_2026, FICA_2026, STATE_2026, HEALTHCARE_2026,
   CHILDCARE_PROV, CHILDCARE_STATE_DEFAULT) and the pure calculation functions
   live in calc.js — see <script src="calc.js"> above. They are visible here
   as globals. calc.js is also the import target for the Node test suite. */

/* CHANGELOG and ROADMAP arrays live in changelog.js (loaded as a separate
   <script> above). Visible here as globals. Prepend new entries there. */

/* Pure calc functions (applyBrackets, calcOntarioSurtax, calcOntarioHealthPremium,
   calcCPP, calcEI, calculateCanada, calcStateTax, calculateUS,
   estimateHealthcareCost, buildBreakeven) live in calc.js. */

const fmtCAD = (n) => '$' + Math.round(n).toLocaleString('en-CA');
const fmtUSD = (n) => '$' + Math.round(n).toLocaleString('en-US');
const fmtSigned = (n, fmt) => (n >= 0 ? '+' : '−') + fmt(Math.abs(n));

/* ========================================================================
   APP
   ======================================================================== */

const INITIAL_STATE = {
  salaryCAD: 0,
  salaryUSD: 0,
  province: 'ON',
  state: 'CA',
  filingStatus: 'single',
  kids: 0,
  familySituation: 'single',

  // v4.0.0 — spouse work-auth + income shock
  spouseIncomeCAD: 0,
  visaType: 'TN',
  spouseCanWorkOverride: null, // null = use visa default

  // v4.0.0 — Canadian housing
  caHousing: 'rent',           // 'rent' | 'own'
  caRentMonthlyCAD: 0,
  caHomeValueCAD: 0,
  caMortgageBalanceCAD: 0,
  caHomeDecision: 'sell',      // 'sell' | 'keep'

  // v4.0.0 — US housing + cost-of-living. 0 = "use the state-keyed
  // default", set in the result useMemo. Real edits become >0 (or in
  // the multiplier's case, a non-zero float).
  usMonthlyHousingUSD: 0,
  usCOLmultiplier: 0,

  // v4.0.0 — investments + offer credits
  unrealizedGainsCAD: 0,
  signOnBonusUSD: 0,
  relocationCoverageUSD: 0,

  fxRate: 0.73,
  movingCostsCAD: 15000        // physical move + immigration legal only;
                               // realtor/departure-tax now modeled separately
};

function App() {
  const [state, setState] = useState(INITIAL_STATE);
  const [view, setView] = useState(() => window.location.hash.slice(1) === 'changelog' ? 'changelog' : 'main');
  const [aiTrigger, setAiTrigger] = useState(0);

  useEffect(() => {
    if ('scrollRestoration' in window.history) {
      window.history.scrollRestoration = 'manual';
    }
    const initialHash = window.location.hash.slice(1);
    if (initialHash !== 'changelog') {
      if (initialHash) {
        window.history.replaceState(null, '', window.location.pathname);
      }
      window.scrollTo(0, 0);
    }
    const onHash = () => {
      setView(window.location.hash.slice(1) === 'changelog' ? 'changelog' : 'main');
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const update = (patch) => setState(s => ({ ...s, ...patch }));

  const navigate = (toView) => {
    if (toView === 'main') {
      window.history.replaceState(null, '', window.location.pathname);
    } else {
      window.history.replaceState(null, '', '#' + toView);
    }
    setView(toView);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  const scrollToSection = (id) => {
    document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  const scrollToWizard = () => {
    if (view !== 'main') {
      window.history.replaceState(null, '', window.location.pathname);
      setView('main');
    }
    setTimeout(() => {
      document.getElementById('wizard')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);
  };

  const result = useMemo(() => {
    /* Primary worker take-home */
    const ca = calculateCanada({ income: state.salaryCAD, province: state.province });
    const us = calculateUS({
      income: state.salaryUSD,
      state: state.state,
      filingStatus: state.filingStatus,
      kids: state.kids
    });

    /* Spouse income shock — the single biggest "honesty" delta. If the trailing
       spouse can't legally work in the US (TN/H1B/O1 default), every dollar
       they earned in Canada vanishes from the household budget. */
    const spouseCa = state.spouseIncomeCAD > 0
      ? calculateCanada({ income: state.spouseIncomeCAD, province: state.province })
      : { gross: 0, takeHome: 0 };
    const spouseCanWork = state.spouseCanWorkOverride !== null
      ? state.spouseCanWorkOverride
      : spouseCanWorkInUS(state.visaType);
    /* Naive: if spouse can work, assume parity with their CA take-home (we don't
       collect a separate USD spouse offer). Conservative — most spouses take a
       paycut in the new market. User can override the visa toggle if needed. */
    const spouseUsAnnualCAD = spouseCanWork && state.spouseIncomeCAD > 0
      ? spouseCa.takeHome
      : 0;
    const spouseAnnualLossCAD = spouseCa.takeHome - spouseUsAnnualCAD;

    /* Healthcare + childcare (existing) */
    const usHealthcare = state.salaryUSD > 0 ? estimateHealthcareCost(state.filingStatus, state.kids) : 0;
    const usChildcare = state.kids * (CHILDCARE_STATE_DEFAULT[state.state] || 22000);
    const caChildcare = state.kids * (CHILDCARE_PROV[state.province] || 3000);

    /* Housing — both sides. Inputs left blank fall back to province/state
       defaults so the verdict still renders something useful. */
    const caRentEffective = state.caRentMonthlyCAD || CA_RENT_DEFAULT_MONTHLY_CAD[state.province] || 0;
    const usHousingMonthlyEffectiveUSD = state.usMonthlyHousingUSD || US_HOUSING_DEFAULT_MONTHLY_USD[state.state] || 0;
    const colMultiplierEffective = state.usCOLmultiplier || US_COL_MULTIPLIER_DEFAULT[state.state] || 1.0;

    const caHousingMonthly = caHousingMonthlyCAD({
      caHousing: state.caHousing,
      caRentMonthlyCAD: caRentEffective,
      caMortgageBalanceCAD: state.caMortgageBalanceCAD,
      caHomeDecision: state.caHomeDecision
    });
    const caHousingAnnualCAD = caHousingMonthly * 12;
    const usHousingAnnualUSD = usHousingMonthlyEffectiveUSD * 12;
    const usHousingAnnualCAD = usHousingAnnualUSD / (state.fxRate || 0.73);
    const housingDeltaAnnualCAD = usHousingAnnualCAD - caHousingAnnualCAD;

    /* Cost-of-living delta (ex-housing/childcare/healthcare) */
    const colExtraAnnualCAD = estimateColExtraAnnualCAD({
      multiplier: colMultiplierEffective,
      salaryCAD: state.salaryCAD
    });

    /* Departure marginal rate + full one-time exit costs */
    const marginalRateCA = getMarginalRateCanada(state.salaryCAD, state.province);
    const exitCosts = estimateExitCostsCAD({
      caHousing: state.caHousing,
      caHomeValueCAD: state.caHomeValueCAD,
      caHomeDecision: state.caHomeDecision,
      unrealizedGainsCAD: state.unrealizedGainsCAD,
      marginalRateCA,
      signOnBonusUSD: state.signOnBonusUSD,
      relocationCoverageUSD: state.relocationCoverageUSD,
      movingCostsCAD: state.movingCostsCAD,
      usMonthlyHousingUSD: usHousingMonthlyEffectiveUSD,
      fxRate: state.fxRate
    });

    /* Household annual cash flow on each side, all in CAD.
       CA: primary + spouse take-home, minus CA childcare and CA housing.
       US: primary US take-home (after healthcare/childcare/housing) converted
           to CAD, plus spouse US contribution, minus the COL premium. */
    const usTakeHomeUSD = us.takeHome - usHealthcare - usChildcare - usHousingAnnualUSD;
    const usTakeHomeCAD = state.salaryUSD > 0 ? usTakeHomeUSD / state.fxRate : 0;
    const caTakeHomeCAD = ca.takeHome - caChildcare - caHousingAnnualCAD;
    const caHouseholdAnnualCAD = caTakeHomeCAD + spouseCa.takeHome;
    const usHouseholdAnnualCAD = usTakeHomeCAD + spouseUsAnnualCAD - colExtraAnnualCAD;

    const netDeltaCAD = usHouseholdAnnualCAD - caHouseholdAnnualCAD;

    const { pts, breakeven } = buildHouseholdBreakeven({
      caHouseholdAnnualCAD,
      usHouseholdAnnualCAD,
      oneTimeNetCostCAD: exitCosts.net,
      years: 5
    });
    const fiveYrDelta = pts[5].us - pts[5].ca;
    const threeYrDelta = pts[3].us - pts[3].ca;

    return {
      // primary
      caTakeHomeCAD, usTakeHomeCAD,
      usHealthcare, usChildcare, caChildcare,
      // spouse
      spouseCanWork, spouseUsAnnualCAD, spouseAnnualLossCAD,
      spouseCaTakeHome: spouseCa.takeHome,
      // housing + COL
      caHousingAnnualCAD, usHousingAnnualCAD, housingDeltaAnnualCAD, colExtraAnnualCAD,
      caHousingMonthly, usHousingMonthlyUSD: usHousingMonthlyEffectiveUSD, colMultiplier: colMultiplierEffective,
      // exit
      marginalRateCA, exitCosts,
      // aggregate
      caHouseholdAnnualCAD, usHouseholdAnnualCAD,
      netDeltaCAD, pts, breakeven, fiveYrDelta, threeYrDelta
    };
  }, [state]);

  if (view === 'changelog') {
    return (
      <>
        <a href="#main" className="skip-link">Skip to content</a>
        <main id="main" className="min-h-screen">
          <Header navigate={navigate} scrollToSection={scrollToSection} scrollToWizard={scrollToWizard} view={view} />
          <ChangelogView />
          <Footer state={state} update={update} />
        </main>
      </>
    );
  }

  return (
    <>
      <a href="#main" className="skip-link">Skip to content</a>
      <main id="main" className="min-h-screen">
        <Header navigate={navigate} scrollToSection={scrollToSection} scrollToWizard={scrollToWizard} view={view} />
        <Marquee />
        <Hero scrollToWizard={scrollToWizard} />
        <HiddenCosts result={result} state={state} />
        <Wizard state={state} update={update} scrollToSection={scrollToSection} onComplete={() => setAiTrigger(t => t + 1)} />
        <VerdictSection state={state} update={update} result={result} aiTrigger={aiTrigger} />
        <Footer state={state} update={update} />
      </main>
    </>
  );
}

/* ============================================================
   HEADER
   ============================================================ */
function Header({ navigate, scrollToSection, scrollToWizard, view }) {
  return (
    <header className="border-b border-night/10">
      <div className="max-w-[1280px] mx-auto px-6 md:px-10 py-5 flex items-center justify-between gap-6">
        <button onClick={() => navigate('main')} className="flex items-center gap-3 text-left">
          <div className="w-10 h-10 rounded-full bg-lime grid place-items-center shrink-0">
            <span className="display text-night text-xl font-bold leading-none">N×S</span>
          </div>
          <div>
            <div className="grotesk font-bold text-night text-lg leading-none flex items-center gap-1.5">
              <span aria-hidden="true">🇨🇦</span>
              <span>North<span className="text-pink">×</span>South</span>
              <span aria-hidden="true">🇺🇸</span>
            </div>
            <div className="label text-night/50 mt-1">Cross-border honesty audit</div>
          </div>
        </button>
        <nav className="flex items-center gap-3 md:gap-5">
          {view === 'main' && (
            <>
              <button onClick={() => scrollToSection('thesis')} className="label text-night/70 hover:text-pink transition-colors hidden sm:inline">The plan</button>
              <button onClick={() => scrollToSection('hidden')} className="label text-night/70 hover:text-pink transition-colors hidden md:inline">Hidden costs</button>
              <button onClick={() => scrollToSection('wizard')} className="label text-night/70 hover:text-pink transition-colors hidden md:inline">Run it</button>
            </>
          )}
          <button onClick={() => navigate('changelog')} className={`label transition-colors hidden sm:inline ${view === 'changelog' ? 'text-pink' : 'text-night/70 hover:text-pink'}`}>
            Changelog
          </button>
          <button onClick={scrollToWizard} className="btn-primary">Start ↓</button>

    </header>
  );
}

    '🇨🇦 CRA SENDS A GOODBYE BILL',

    '🇨🇦 TFSA ≠ TAX-FREE IN THE US',

    '🇨🇦 TN VISA = SPOUSE CAN\'T WORK',

}

/* ============================================================
   HERO — the thesis
   ============================================================ */
function Hero({ scrollToWizard }) {
  return (
    <section id="thesis" className="relative overflow-hidden">
      <div className="max-w-[1280px] mx-auto px-6 md:px-10 pt-12 md:pt-20 pb-20 md:pb-28">

        <div className="flex items-center gap-3 mb-10 md:mb-14 flex-wrap">
          <span className="sticker sticker-lime">Premise</span>
          <span className="grotesk text-night/70 text-sm md:text-base">— the math you don't see on the offer letter</span>
        </div>

        <div className="relative">
          <h2 className="display font-bold text-[clamp(2.5rem,8vw,7rem)] leading-[1.02] tracking-tight text-night max-w-[14ch] pb-2">
            Most Canadians moving south have <span className="hl-lime">the same plan</span>.
          </h2>
          <div className="hidden lg:block absolute right-0 top-8 floating-tag-r">
            <div className="sticker sticker-pink text-sm py-3 px-5">
              you have it too, don't you 👀
            </div>
          </div>
        </div>

        <div className="mt-14 md:mt-20 grid md:grid-cols-3 gap-5 md:gap-6">

        <div className="mt-20 md:mt-32 grid md:grid-cols-12 gap-8 md:gap-12 items-end">
          <div className="md:col-span-7">
            <div className="flex items-center gap-3 mb-5 flex-wrap">
              <span className="sticker sticker-night">⚠ The trouble</span>
              <span className="grotesk text-night/60 text-sm">with the plan, that is</span>
            </div>
            <h3 className="display font-bold text-[clamp(2.25rem,6vw,5rem)] leading-[1.04] tracking-tight text-night pb-2">
              The detour <span className="strike-pink text-night/60">always</span> ends with you ahead.
              <span className="block mt-2 text-pink display italic">Except when it doesn't.</span>
            </h3>
            <p className="grotesk text-lg md:text-xl text-night/80 mt-7 max-w-2xl leading-relaxed">
              Higher salary, higher cost of living. Healthcare premiums you've never paid.
              Childcare priced like a second mortgage. A TFSA the IRS will tax.
              And a goodbye bill from CRA on your way out.
            </p>
            <p className="grotesk text-lg md:text-xl text-night mt-5 max-w-2xl leading-relaxed font-semibold">
              The gap between the offer and the outcome is where <span className="hl-lime">this calculator lives</span>.
            </p>
          </div>

          <div className="md:col-span-5 space-y-4">
            <FailMode n="i" kicker="The break-even illusion" line="On paper: +$110k/yr. After healthcare + childcare: +$40k less."/>
            <FailMode n="ii" kicker="The cost-of-living trap" line="SF rent is 2.4× Toronto. The raise vanishes into a 1-bed."/>
            <FailMode n="iii" kicker="The exit penalty" line="CRA departure tax + TFSA wind-down = $20k–$60k on the way out."/>
          </div>
        </div>

        <div className="mt-20 md:mt-28 flex flex-col md:flex-row md:items-center gap-6">
          <button onClick={scrollToWizard} className="btn-primary self-start">
            See if your plan survives the math ↓
          </button>
          <div className="grotesk text-night/70 text-base md:text-lg max-w-md">
            5 questions · 3 minutes · your numbers, not a stranger's
          </div>
        </div>
      </div>
    </section>
  );
}

function PlanCard({ n, color, headline, sub }) {
  const cls = color === 'lime' ? 'panel-lime' : color === 'pink' ? 'panel-pink' : color === 'cobalt' ? 'panel-cobalt' : 'panel-cream';
  return (
    <div className={`${cls} p-7 md:p-8 relative overflow-hidden`}>
      <div className="grotesk font-bold text-sm opacity-80 mb-8">STEP {n}</div>
      <div className="display text-2xl md:text-[28px] font-bold leading-tight mb-3">{headline}</div>
      <div className="grotesk text-base opacity-80">{sub}</div>
      <div className="absolute -right-6 -bottom-8 stat-num text-[140px] font-bold opacity-10 leading-none">{n}</div>
    </div>
  );
}

function FailMode({ n, kicker, line }) {
  return (
    <div className="panel p-5 md:p-6 grid grid-cols-[36px_1fr] gap-4">
      <div className="display italic text-2xl text-pink leading-none pt-1">{n}.</div>
      <div>
        <div className="grotesk font-bold text-night text-base mb-1">{kicker}</div>
        <div className="text-sm text-night/70 leading-snug">{line}</div>
      </div>
    </div>
  );
}

/* ============================================================
   HIDDEN COSTS — Section 1
   ============================================================ */
function HiddenCosts({ result, state }) {
  const hasUSD = state.salaryUSD > 0;
  const usHealthcareLine = hasUSD ? '−' + fmtUSD(result.usHealthcare) : '−$11,700';
  const healthcareLabel = hasUSD
    ? (state.filingStatus === 'single' ? 'single, annual' : state.kids > 0 ? `family of ${2 + state.kids}` : 'married, no kids')
    : 'family of 3';
  const usChildcareLine = state.kids > 0
    ? '−' + fmtUSD(CHILDCARE_STATE_DEFAULT[state.state] || 22000)
    : '−$25,500';
  const childcareLabel = state.kids > 0
    ? `${STATE_2026[state.state].short} per kid`
    : 'CA vs ON delta';

  return (
    <section id="hidden" className="border-t border-night/10">
      <div className="max-w-[1280px] mx-auto px-6 md:px-10 py-20 md:py-28 grid md:grid-cols-12 gap-10">
        <aside className="md:col-span-4">
          <div className="sticky top-10">
            <h3 className="display text-[clamp(2.25rem,4.5vw,3.5rem)] font-bold leading-[1.06] text-night tracking-tight pb-1">
              The four numbers<br/>that <span className="hl-pink">flip the plan</span>
            </h3>
          </div>
        </aside>

        <div className="md:col-span-8 grid sm:grid-cols-2 gap-5 md:gap-6">
          <CostCard n="i" color="pink" title="Healthcare" tag="annual"
            num={usHealthcareLine} label={healthcareLabel}
            body="Premiums + out-of-pocket runs $7k–$12k a year. Get fired? COBRA hits $2,000/month."/>
          <CostCard n="ii" color="cobalt" title="Childcare" tag="per kid"
            num={usChildcareLine} label={childcareLabel}
            body="CWELCC is real — Ontario daycare is $2.4k/yr. California daycare is $28k. Per kid. Per year."/>
          <CostCard n="iii" color="lime" title="The TFSA trap" tag="one-time"
            num="$3–8k" label="accountant + tax"
            body="IRS doesn't recognize the shelter. ETFs trigger PFIC reporting (Form 8621). Liquidate before you go."/>
          <CostCard n="iv" color="night" title="Departure tax" tag="one-time"
            num="varies" label="depends on portfolio"
            body="CRA deems disposition the day you sever residency. You owe capital gains on paper gains. RRSPs exempt."/>
        </div>

        <div className="md:col-span-12 mt-6 flex items-center gap-4 flex-wrap">
          <span className="sticker sticker-lime">Next ↓</span>
          <span className="grotesk text-night/70 text-base md:text-lg">
            Plug in your numbers. Section 03 reveals what's actually left.
          </span>
        </div>
      </div>
    </section>
  );
}

function CostCard({ n, color, title, tag, num, label, body }) {
  const cls =
    color === 'lime' ? 'panel-lime' :
    color === 'pink' ? 'panel-pink' :
    color === 'cobalt' ? 'panel-cobalt' :
    color === 'night' ? 'panel-night' :
    'panel-cream';
  return (
    <div className={`${cls} p-7 md:p-8 relative overflow-hidden flex flex-col`}>
      <div className="flex items-baseline justify-between mb-6">
        <span className="grotesk font-bold text-sm opacity-80">{n.toUpperCase()}</span>
        <span className="grotesk font-bold text-xs uppercase tracking-widest opacity-60">{tag}</span>
      </div>
      <div className="display text-2xl md:text-3xl font-bold leading-tight mb-4">{title}</div>
      <div className="stat-num text-[40px] md:text-[52px] leading-none mb-1">{num}</div>
      <div className="grotesk text-xs uppercase tracking-wider opacity-70 mb-5">{label}</div>
      <div className="grotesk text-sm leading-relaxed opacity-85 mt-auto">{body}</div>
    </div>
  );
}

/* ============================================================
   WIZARD — v4.0.0 multi-field steps
   ============================================================ */
function MoneyInput({ symbol = '$', currency, value, onChange, placeholder, autoFocus, onEnter }) {
  return (
    <div className="flex items-baseline gap-2">
      <span className="num text-2xl text-night/40">{symbol}</span>
      <input
        autoFocus={autoFocus}
        type="number"
        inputMode="numeric"
        className="input-line"
        placeholder={placeholder}
        value={value || ''}
        onChange={e => onChange(parseInt(e.target.value) || 0)}
        onKeyDown={e => { if (e.key === 'Enter' && onEnter) onEnter(); }}
        onFocus={e => e.target.select()}
      />
      <span className="num text-sm text-night/60">{currency}</span>
    </div>
  );
}

function Wizard({ state, update, scrollToSection, onComplete }) {
  const [step, setStep] = useState(0);
  const steps = [
    { kicker: 'Step 1 / 5', q: 'Where you stand',     sub: 'Current Canadian salary, the US offer, and where each is.' },
    { kicker: 'Step 2 / 5', q: 'Family + spouse',     sub: "Family situation, spouse income, visa type. The TN/TD work-auth gap is where most household budgets break." },
    { kicker: 'Step 3 / 5', q: 'Home in Canada',      sub: 'Own or rent — and if you own, sell or keep it.' },
    { kicker: 'Step 4 / 5', q: 'Home + life in the US', sub: 'Monthly housing and a rough cost-of-living adjustment vs. Toronto baseline.' },
    { kicker: 'Step 5 / 5', q: 'The exit + the offer', sub: 'Unrealized capital gains for departure tax, plus what the employer is putting on the table.' },
  ];
  const cur = steps[step];
  const pct = ((step + 1) / steps.length) * 100;

  const setFamily = (situation) => {
    if (situation === 'single') update({ familySituation: 'single', filingStatus: 'single', kids: 0, spouseIncomeCAD: 0 });
    else if (situation === 'mfj-no-kids') update({ familySituation: 'mfj-no-kids', filingStatus: 'mfj', kids: 0 });
    else update({ familySituation: 'mfj-with-kids', filingStatus: 'mfj', kids: state.kids || 1 });
  };

  const handleNext = () => {
    if (step === steps.length - 1) {
      onComplete?.();
      scrollToSection('verdict');
    } else {
      setStep(step + 1);
    }
  };

  const isMarried = state.familySituation === 'mfj-no-kids' || state.familySituation === 'mfj-with-kids';
  const visaInfo = VISA_SPOUSE_WORK[state.visaType];
  const spouseCanWork = state.spouseCanWorkOverride !== null
    ? state.spouseCanWorkOverride
    : (visaInfo?.canWorkDefault ?? false);

  const usHousingPlaceholder = US_HOUSING_DEFAULT_MONTHLY_USD[state.state] || 2500;
  const colPlaceholder = US_COL_MULTIPLIER_DEFAULT[state.state] || 1.0;
  const caRentPlaceholder = CA_RENT_DEFAULT_MONTHLY_CAD[state.province] || 2500;

  return (
    <section id="wizard" className="border-t border-night/10 bg-cream/50">
      <div className="max-w-[1280px] mx-auto px-6 md:px-10 py-20 md:py-28">
        <div className="grid md:grid-cols-12 gap-10">
          <aside className="md:col-span-4">
            <div className="sticky top-10">
              <h3 className="display text-[clamp(2.25rem,4.5vw,3.5rem)] font-bold leading-[1.06] text-night tracking-tight pb-1">
                Your turn —<br/>five real <span className="hl-cobalt">questions</span>
              </h3>
            </div>
          </aside>

          <div className="md:col-span-8">
            <div className="panel p-8 md:p-10">
              <div className="flex items-center justify-between mb-8">
                <span className="label text-night/70">{cur.kicker}</span>
                <span className="num text-xs text-night/50">{step + 1} / {steps.length}</span>
              </div>
              <div className="h-[4px] bg-night/10 rounded-full mb-10 overflow-hidden">
                <div className="h-full bg-lime rounded-full transition-all duration-500" style={{width: pct + '%'}}/>
              </div>

              <div className="min-h-[360px]">
                <h4 className="display text-3xl md:text-5xl font-bold leading-[1.05] mb-3 text-night tracking-tight pb-1">
                  {cur.q}
                </h4>
                <p className="grotesk text-base md:text-lg text-night/60 mb-10 leading-relaxed">{cur.sub}</p>

                {step === 0 && (
                  <div className="space-y-8 max-w-xl">
                    <div>
                      <div className="label text-night/60 mb-3">Current salary</div>
                      <MoneyInput
                        autoFocus currency="CAD" placeholder="165,000"
                        value={state.salaryCAD}
                        onChange={v => update({ salaryCAD: v })}
                      />
                      <div className="mt-4 flex flex-wrap gap-2">
                        {Object.entries(PROVINCIAL_2026).map(([k, v]) => (
                          <button key={k} className={`pill ${state.province === k ? 'active' : ''}`}
                            onClick={() => update({ province: k })}>
                            {v.label}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div>
                      <div className="label text-night/60 mb-3">US offer</div>
                      <MoneyInput
                        currency="USD" placeholder="245,000"
                        value={state.salaryUSD}
                        onChange={v => update({ salaryUSD: v })}
                      />
                      <div className="mt-4 flex flex-wrap gap-2">
                        {Object.entries(STATE_2026).map(([k, v]) => (
                          <button key={k} className={`pill ${state.state === k ? 'active' : ''}`}
                            onClick={() => update({ state: k })}>
                            {v.label}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {step === 1 && (
                  <div className="space-y-8 max-w-xl">
                    <div className="flex flex-wrap gap-2">
                      {[
                        { id: 'single',          label: 'Single' },
                        { id: 'mfj-no-kids',     label: 'Married, no kids' },
                        { id: 'mfj-with-kids',   label: 'Married, with kids' }
                      ].map(s => (
                        <button key={s.id} className={`pill ${state.familySituation === s.id ? 'active' : ''}`}
                          onClick={() => setFamily(s.id)}>
                          {s.label}
                        </button>
                      ))}
                    </div>

                    {state.familySituation === 'mfj-with-kids' && (
                      <div>
                        <div className="label text-night/60 mb-3">Number of kids</div>
                        <input type="number" min="1" className="input-line max-w-[140px]"
                          value={state.kids || 1}
                          onChange={e => update({ kids: parseInt(e.target.value) || 1 })}/>
                      </div>
                    )}

                    {isMarried && (
                      <>
                        <div>
                          <div className="label text-night/60 mb-3">Spouse's current Canadian salary</div>
                          <MoneyInput
                            currency="CAD" placeholder="0 if not working"
                            value={state.spouseIncomeCAD}
                            onChange={v => update({ spouseIncomeCAD: v })}
                          />
                          <p className="grotesk text-xs text-night/50 mt-2 leading-relaxed">
                            If your spouse can't work in the US, this is the household income shock.
                          </p>
                        </div>
                        <div>
                          <div className="label text-night/60 mb-3">Your visa path</div>
                          <div className="flex flex-wrap gap-2">
                            {Object.entries(VISA_SPOUSE_WORK).map(([k, v]) => (
                              <button key={k}
                                className={`pill ${state.visaType === k ? 'active' : ''}`}
                                onClick={() => update({ visaType: k, spouseCanWorkOverride: null })}>
                                {v.label}
                              </button>
                            ))}
                          </div>
                          <p className="grotesk text-xs text-night/60 mt-3 leading-relaxed">
                            Default: spouse {spouseCanWork ? <span className="font-semibold text-night">can work</span> : <span className="font-semibold text-pink">cannot work</span>} on a {visaInfo?.spouseLabel}.{' '}
                            {state.spouseIncomeCAD > 0 && (
                              <button
                                onClick={() => update({ spouseCanWorkOverride: !spouseCanWork })}
                                className="underline decoration-dotted underline-offset-2 hover:decoration-solid">
                                Override
                              </button>
                            )}
                          </p>
                        </div>
                      </>
                    )}
                  </div>
                )}

                {step === 2 && (
                  <div className="space-y-8 max-w-xl">
                    <div className="flex flex-wrap gap-2">
                      <button className={`pill ${state.caHousing === 'rent' ? 'active' : ''}`}
                        onClick={() => update({ caHousing: 'rent' })}>I rent</button>
                      <button className={`pill ${state.caHousing === 'own' ? 'active' : ''}`}
                        onClick={() => update({ caHousing: 'own' })}>I own</button>
                    </div>

                    {state.caHousing === 'rent' && (
                      <div>
                        <div className="label text-night/60 mb-3">Monthly rent</div>
                        <MoneyInput
                          currency="CAD/mo" placeholder={String(caRentPlaceholder)}
                          value={state.caRentMonthlyCAD}
                          onChange={v => update({ caRentMonthlyCAD: v })}
                        />
                        <p className="grotesk text-xs text-night/50 mt-2 leading-relaxed">
                          Default for {PROVINCIAL_2026[state.province].short}: ${caRentPlaceholder.toLocaleString('en-CA')}/mo. Leave blank to use it.
                        </p>
                      </div>
                    )}

                    {state.caHousing === 'own' && (
                      <>
                        <div>
                          <div className="label text-night/60 mb-3">Estimated home value</div>
                          <MoneyInput
                            currency="CAD" placeholder="950,000"
                            value={state.caHomeValueCAD}
                            onChange={v => update({ caHomeValueCAD: v })}
                          />
                        </div>
                        <div>
                          <div className="label text-night/60 mb-3">Mortgage balance remaining</div>
                          <MoneyInput
                            currency="CAD" placeholder="650,000"
                            value={state.caMortgageBalanceCAD}
                            onChange={v => update({ caMortgageBalanceCAD: v })}
                          />
                        </div>
                        <div>
                          <div className="label text-night/60 mb-3">When you move</div>
                          <div className="flex flex-wrap gap-2">
                            <button className={`pill ${state.caHomeDecision === 'sell' ? 'active' : ''}`}
                              onClick={() => update({ caHomeDecision: 'sell' })}>Sell it</button>
                            <button className={`pill ${state.caHomeDecision === 'keep' ? 'active' : ''}`}
                              onClick={() => update({ caHomeDecision: 'keep' })}>Keep paying it</button>
                          </div>
                          <p className="grotesk text-xs text-night/50 mt-3 leading-relaxed">
                            Sell adds ~5.5% (realtor + legal) to exit costs but kills the carrying cost. Keep means the mortgage continues — modeled as ~5%/12 of balance + $500/mo (taxes + maintenance), ignoring rental income.
                          </p>
                        </div>
                      </>
                    )}
                  </div>
                )}

                {step === 3 && (
                  <div className="space-y-8 max-w-xl">
                    <div>
                      <div className="label text-night/60 mb-3">US monthly housing</div>
                      <MoneyInput
                        currency="USD/mo" placeholder={String(usHousingPlaceholder)}
                        value={state.usMonthlyHousingUSD}
                        onChange={v => update({ usMonthlyHousingUSD: v })}
                      />
                      <p className="grotesk text-xs text-night/50 mt-2 leading-relaxed">
                        Default for {STATE_2026[state.state].short}: ${usHousingPlaceholder.toLocaleString('en-US')}/mo. Leave blank to use it. Two months go in as a security deposit (one-time exit cost).
                      </p>
                    </div>
                    <div>
                      <div className="label text-night/60 mb-3">Cost-of-living multiplier vs. Toronto</div>
                      <div className="flex items-baseline gap-3 max-w-xs">
                        <input
                          type="number" step="0.05" min="0.5" max="3" className="input-line"
                          placeholder={String(colPlaceholder)}
                          value={state.usCOLmultiplier || ''}
                          onChange={e => update({ usCOLmultiplier: parseFloat(e.target.value) || 0 })}
                        />
                        <span className="num text-sm text-night/60">×</span>
                      </div>
                      <p className="grotesk text-xs text-night/50 mt-2 leading-relaxed">
                        Default for {STATE_2026[state.state].short}: <span className="num font-semibold text-night/70">{colPlaceholder}×</span>. Covers groceries, transport, dining out (housing/healthcare/childcare are modeled separately). Leave blank to use the default.
                      </p>
                    </div>
                  </div>
                )}

                {step === 4 && (
                  <div className="space-y-8 max-w-xl">
                    <div>
                      <div className="label text-night/60 mb-3">Unrealized capital gains (non-registered + crypto + RSUs)</div>
                      <MoneyInput
                        currency="CAD" placeholder="0"
                        value={state.unrealizedGainsCAD}
                        onChange={v => update({ unrealizedGainsCAD: v })}
                      />
                      <p className="grotesk text-xs text-night/50 mt-2 leading-relaxed">
                        CRA deems disposition the day you sever residency. Tax = gains × 50% × your marginal rate. RRSPs and TFSAs are exempt from deemed disposition (TFSA loses tax-shelter status separately — that's the "TFSA trap").
                      </p>
                    </div>
                    <div>
                      <div className="label text-night/60 mb-3">Sign-on bonus from US employer</div>
                      <MoneyInput
                        currency="USD" placeholder="0"
                        value={state.signOnBonusUSD}
                        onChange={v => update({ signOnBonusUSD: v })}
                      />
                    </div>
                    <div>
                      <div className="label text-night/60 mb-3">Relocation coverage from US employer</div>
                      <MoneyInput
                        currency="USD" placeholder="0"
                        value={state.relocationCoverageUSD}
                        onChange={v => update({ relocationCoverageUSD: v })}
                      />
                      <p className="grotesk text-xs text-night/50 mt-2 leading-relaxed">
                        Sign-on + relocation are credited against exit costs. If they exceed costs, the leftover doesn't get added back (it's already in your salary number).
                      </p>
                    </div>
                    <div>
                      <div className="label text-night/60 mb-3">Out-of-pocket move + immigration legal</div>
                      <MoneyInput
                        currency="CAD" placeholder="15,000"
                        value={state.movingCostsCAD}
                        onChange={v => update({ movingCostsCAD: v })}
                      />
                      <p className="grotesk text-xs text-night/50 mt-2 leading-relaxed">
                        Movers, flights, lawyer, TN/H1B filing, school deposits, car shipping, etc. Departure tax + realtor fees are computed separately.
                      </p>
                    </div>
                  </div>
                )}
              </div>

              <div className="mt-12 flex items-center justify-between gap-4 pt-7 border-t border-night/10">
                <button onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0}
                  className="label text-night/60 hover:text-night disabled:opacity-30">
                  ← Back
                </button>
                <button onClick={handleNext} className="btn-primary">
                  {step === steps.length - 1 ? 'See the verdict →' : 'Next →'}
                </button>
              </div>
            </div>

            <div className="mt-8 flex justify-center gap-2">
              {steps.map((_, i) => (
                <button key={i} onClick={() => setStep(i)}
                  className={`h-2 rounded-full transition-all ${i === step ? 'bg-lime w-8' : i < step ? 'bg-night/40 w-2' : 'bg-night/15 w-2'}`}/>
              ))}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ============================================================
   VERDICT — Section 3
   ============================================================ */
function VerdictSection({ state, update, result, aiTrigger }) {
  const hasInput = state.salaryCAD > 0 && state.salaryUSD > 0;
  const [chartInsight, setChartInsight] = React.useState('');
  const fiveYrDelta = result.fiveYrDelta;
  const threeYrDelta = result.threeYrDelta;

  const familyLabel =
    state.familySituation === 'single' ? 'single' :
    state.familySituation === 'mfj-no-kids' ? 'married, no kids' :
    `married + ${state.kids} kid${state.kids === 1 ? '' : 's'}`;

  const visaSpouseLine =
    hasInput && (state.familySituation === 'mfj-no-kids' || state.familySituation === 'mfj-with-kids') && state.spouseIncomeCAD > 0
      ? ` · spouse ${result.spouseCanWork ? 'works' : 'cannot work'} on ${VISA_SPOUSE_WORK[state.visaType]?.spouseLabel || state.visaType}`
      : '';

  const inputSummary = hasInput
    ? `based on your inputs · ${fmtCAD(state.salaryCAD)} ${PROVINCIAL_2026[state.province].short} → $${state.salaryUSD.toLocaleString('en-US')} ${STATE_2026[state.state].short} · ${familyLabel}${visaSpouseLine}`
    : 'based on your inputs · run the wizard above';

  let verdictTitle = 'Plan survives — barely.';
  let verdictBody = 'Worth it if you stay 4+ years and resist lifestyle drift.';
  let verdictColor = 'lime';
  if (!hasInput) {
    verdictTitle = 'Verdict pending.';
    verdictBody = 'Answer the five-step wizard above to see whether the plan holds up.';
    verdictColor = 'cream';
  } else if (fiveYrDelta < 0) {
    verdictTitle = 'Plan breaks down.';
    verdictBody = 'On these inputs, the move costs you money over 5 years. Negotiate higher or stay.';
    verdictColor = 'pink';
  } else if (fiveYrDelta > 400000) {
    verdictTitle = 'Plan crushes it.';
    verdictBody = 'Strong delta — even with lifestyle drift, the move pays off comfortably.';
    verdictColor = 'lime';
  }

  const verdictClass =
    verdictColor === 'lime' ? 'panel-lime' :
    verdictColor === 'pink' ? 'panel-pink' :
    'panel-cream';

  return (
    <section id="verdict" className="border-t border-night/10">
      <div className="max-w-[1280px] mx-auto px-6 md:px-10 py-20 md:py-28">

        <div className="grid md:grid-cols-12 gap-10 mb-14">
          <div className="md:col-span-7">
            {hasInput ? (
              <h3 className="display text-[clamp(2.25rem,5.5vw,4.5rem)] font-bold leading-[1.05] text-night tracking-tight pb-2">
                Stay <span className="hl-lime">five years</span>, you come home roughly{' '}
                <span className={fiveYrDelta >= 0 ? 'hl-lime' : 'hl-pink'}>{fmtCAD(Math.abs(fiveYrDelta))}</span>{' '}
                {fiveYrDelta >= 0 ? 'ahead.' : 'behind.'}
              </h3>
            ) : (
              <h3 className="display text-[clamp(2rem,4.5vw,3.75rem)] font-bold leading-[1.02] text-night/70 tracking-tight italic">
                Answer the wizard above, and your verdict shows up here.
              </h3>
            )}
            {hasInput && (
              <p className="grotesk text-base md:text-lg text-night/70 mt-6 max-w-2xl leading-relaxed">
                That assumes you save the entire after-tax delta. No lifestyle inflation, no SF rent eating the raise.
                In reality, expect 50–70% of that. Here's the year-by-year so you can see when the move actually pays off.
              </p>
            )}
          </div>

          <div className="md:col-span-5 flex md:justify-end items-start">
            <div className={`floating-tag ${verdictClass} p-6 md:p-7 max-w-xs`}>
              <div className="grotesk font-bold text-xs tracking-widest uppercase mb-3 opacity-70">Verdict</div>
              <div className="display text-2xl md:text-3xl font-bold leading-tight">{verdictTitle}</div>
              <div className="grotesk text-sm mt-3 opacity-80">{verdictBody}</div>
            </div>
          </div>
        </div>

        <div className="grid md:grid-cols-4 gap-4 md:gap-5 mb-14">
          <StatBlock kicker="Pays for itself in"
            value={result.breakeven ? `Year ${result.breakeven.year.toFixed(1)}` : (hasInput ? 'Never' : '—')}
            detail={result.breakeven ? 'when cumulative US take-home overtakes staying' : (hasInput ? "US doesn't catch CA in 5 yrs" : 'awaiting your inputs')}
            color="cobalt"/>
          <StatBlock kicker="3-year nest egg"
            value={hasInput ? fmtSigned(threeYrDelta, fmtCAD) : '—'}
            detail="if you come home after 3 years"
            color="night"/>
          <StatBlock kicker="5-year nest egg"
            value={hasInput ? fmtSigned(fiveYrDelta, fmtCAD) : '—'}
            detail="if you stick the full detour"
            color="lime"/>
          <StatBlock kicker="Net exit cost"
            value={hasInput ? fmtCAD(result.exitCosts.net) : '—'}
            detail={hasInput
              ? (result.exitCosts.credits > 0
                  ? `${fmtCAD(result.exitCosts.gross)} gross − ${fmtCAD(result.exitCosts.credits)} employer credits`
                  : 'moving + realtor + departure tax + deposit')
              : 'computed from your inputs'}
            color="pink"/>
        </div>

        <ExplainPanel state={state} result={result} hasInput={hasInput} autoTrigger={aiTrigger} onChartInsight={setChartInsight} />

        {hasInput && (
          <div className="panel p-6 md:p-10 mb-14">
            <div className="flex items-center gap-3 mb-6 flex-wrap">
              <span className="sticker sticker-cobalt">Household audit</span>
              <span className="grotesk text-night/60 text-sm">where the household money actually goes — annual, in CAD</span>
            </div>
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
              <LineItem
                label="Spouse income shock"
                value={result.spouseAnnualLossCAD > 0 ? fmtSigned(-result.spouseAnnualLossCAD, fmtCAD) : (state.spouseIncomeCAD > 0 ? '$0' : '—')}
                detail={state.spouseIncomeCAD > 0
                  ? (result.spouseCanWork
                      ? `${VISA_SPOUSE_WORK[state.visaType]?.spouseLabel} can work — assumed parity with CA take-home`
                      : `${VISA_SPOUSE_WORK[state.visaType]?.spouseLabel} cannot legally work — full CA take-home gone per year`)
                  : 'no spouse income entered'}
                tone={result.spouseAnnualLossCAD > 0 ? 'pink' : 'neutral'}
              />
              <LineItem
                label="Housing delta"
                value={fmtSigned(-result.housingDeltaAnnualCAD, fmtCAD)}
                detail={`US ${fmtUSD(result.usHousingMonthlyUSD)}/mo (${STATE_2026[state.state].short}) vs CA ${fmtCAD(result.caHousingMonthly)}/mo`}
                tone={result.housingDeltaAnnualCAD > 0 ? 'pink' : 'lime'}
              />
              <LineItem
                label="Cost of living premium"
                value={fmtSigned(-result.colExtraAnnualCAD, fmtCAD)}
                detail={`${result.colMultiplier}× Toronto baseline · ex-housing/healthcare/childcare`}
                tone={result.colExtraAnnualCAD > 0 ? 'pink' : 'neutral'}
              />
              <LineItem
                label="Healthcare premium"
                value={state.salaryUSD > 0 ? fmtSigned(-result.usHealthcare, fmtUSD) : '—'}
                detail={state.kids > 0 ? 'family premium + out-of-pocket' : 'premium + out-of-pocket'}
                tone="pink"
              />
              <LineItem
                label="Childcare delta"
                value={state.kids > 0 ? fmtSigned(result.caChildcare - (result.usChildcare / state.fxRate), fmtCAD) : '—'}
                detail={state.kids > 0

function FxRateEdit({ fx, onChange }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(String(fx));
  useEffect(() => { setVal(String(fx)); }, [fx]);
  const commit = () => {
    const n = parseFloat(val);
    if (Number.isFinite(n) && n > 0 && n < 10) onChange(n);
    else setVal(String(fx));
    setEditing(false);
  };
  if (editing) {
    return (
      <input
        type="number" step="0.01" min="0.1" max="9.99" autoFocus
        value={val}
        onChange={e => setVal(e.target.value)}
        onBlur={commit}
        onKeyDown={e => { if (e.key === 'Enter') e.currentTarget.blur(); if (e.key === 'Escape') { setVal(String(fx)); setEditing(false); } }}
        className="num bg-transparent border-b border-night/60 outline-none w-14 text-night text-xs"
      />
    );
  }
  return (
    <button
      onClick={() => { setVal(String(fx)); setEditing(true); }}
      className="num text-night font-semibold underline decoration-dotted underline-offset-2 hover:decoration-solid focus:outline-none focus-visible:ring-2 focus-visible:ring-lime focus-visible:ring-offset-2 rounded"
      aria-label="Edit FX rate"
    >
      ${fx.toFixed(2)}
    </button>
  );
}

function ExplainPanel({ state, result, hasInput, autoTrigger, onChartInsight }) {
  const [status, setStatus] = useState('idle'); // idle | loading | success | error
  const [text, setText] = useState('');
  const [error, setError] = useState(null);
  const [model, setModel] = useState('');
  const [throttledUntil, setThrottledUntil] = useState(0);

  if (!hasInput) return null;

  const now = Date.now();
  const throttledMs = Math.max(0, throttledUntil - now);
  const throttled = throttledMs > 0;

  const generate = async () => {
    if (throttled) return;
    setStatus('loading');
    setText('');
    setError(null);
    try {
      const res = await fetch('/.netlify/functions/explain', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ state, result })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      setText(data.text || '');
      setModel(data.model || '');
      if (data.chartLine) onChartInsight?.(data.chartLine);
      setStatus('success');
      setThrottledUntil(Date.now() + 30_000); // 30s client-side throttle
    } catch (e) {
      setError(e.message);
      setStatus('error');
    }
  };

  useEffect(() => {
    if (autoTrigger > 0 && !throttled && status === 'idle') generate();
  }, [autoTrigger]);

  return (
    <div className="panel-night p-6 md:p-10 mb-14 text-cream">
      <div className="flex items-center gap-3 mb-5 flex-wrap">
        <span className="sticker sticker-lime">AI</span>
        <span className="grotesk text-cream/70 text-sm">a plain-English read on what's driving your verdict</span>
      </div>

      {status === 'idle' && (
        <>
          <p className="grotesk text-cream/85 text-base md:text-lg leading-relaxed mb-6 max-w-2xl">
            Claude reads your inputs and gives you a tight plain-English breakdown — the verdict, the biggest line item, one thing to sanity-check, and a negotiation lever if there's a clean one.
          </p>
          <button onClick={generate} className="btn-primary">Generate →</button>
          <p className="grotesk text-xs text-cream/50 mt-5 leading-relaxed max-w-2xl">
            Sends your wizard inputs (no PII) to Anthropic's API. The numerical calculator runs entirely in your browser — this is the only feature that doesn't.
          </p>
        </>
      )}

      {status === 'loading' && (
        <div className="grotesk text-cream/80 flex items-center gap-3">
          <span className="inline-flex gap-1.5">
            <span className="w-2 h-2 bg-lime rounded-full animate-pulse"/>
            <span className="w-2 h-2 bg-lime rounded-full animate-pulse" style={{animationDelay:'0.15s'}}/>
            <span className="w-2 h-2 bg-lime rounded-full animate-pulse" style={{animationDelay:'0.3s'}}/>
          </span>
          <span>Claude is reading your inputs…</span>
        </div>
      )}

      {status === 'success' && (
        <div>
          <div className="grotesk text-cream text-base md:text-lg leading-relaxed whitespace-pre-wrap max-w-3xl">{text}</div>
          <div className="mt-7 flex items-center gap-4 flex-wrap">
            <button
              onClick={generate}
              disabled={throttled}
              className="btn-ghost disabled:opacity-40 disabled:cursor-not-allowed"
              style={{ borderColor: 'rgba(255,246,229,0.4)', color: '#FFF6E5' }}>
              {throttled ? `Wait ${Math.ceil(throttledMs / 1000)}s` : 'Regenerate'}
            </button>
            <span className="grotesk text-xs text-cream/45">
              Generated by {model || 'Claude'} · narrative only · numbers are from your wizard inputs
            </span>
          </div>
        </div>
      )}

      {status === 'error' && (
        <div>
          <p className="grotesk text-pink mb-4">Couldn't generate explanation: {error}</p>
          <button onClick={generate} className="btn-ghost"
            style={{ borderColor: 'rgba(255,246,229,0.4)', color: '#FFF6E5' }}>

          </p>
        </div>
      )}
    </div>
  );
}

function BreakevenChart({ pts, breakeven, years, hasInput }) {
  const w = 880, h = 380;
  const padL = 70, padT = 24, padR = 30, padB = 50;
  const plotW = w - padL - padR, plotH = h - padT - padB;

  const allVals = pts.flatMap(p => [p.ca, p.us]);
  let yMin = Math.min(0, ...allVals);
  let yMax = Math.max(...allVals);
  if (!hasInput) { yMin = -50000; yMax = 800000; }
  const yRange = (yMax - yMin) || 1;
  const xS = y => padL + (y / years) * plotW;
  const yS = v => padT + plotH - ((v - yMin) / yRange) * plotH;

  const caPath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xS(p.year)} ${yS(p.ca)}`).join(' ');
  const usPath = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xS(p.year)} ${yS(p.us)}`).join(' ');

  const tickStep = yRange > 1500000 ? 500000 : yRange > 600000 ? 200000 : yRange > 200000 ? 100000 : 50000;
  const yTicks = [];
  for (let v = Math.floor(yMin / tickStep) * tickStep; v <= yMax + 1; v += tickStep) yTicks.push(v);

  const fmtTick = v => {
    if (v === 0) return '$0';
    const sign = v < 0 ? '−' : '';
    const abs = Math.abs(v);
    if (abs >= 1000000) return sign + '$' + (abs / 1000000).toFixed(1) + 'M';
    return sign + '$' + Math.round(abs / 1000) + 'k';
  };

  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto" preserveAspectRatio="xMidYMid meet">
      {yTicks.map(v => (
        <g key={v}>
          <line x1={padL} y1={yS(v)} x2={padL + plotW} y2={yS(v)}
            stroke="#0E0B2C" strokeWidth="1" opacity={v === 0 ? 0.55 : 0.12}
            strokeDasharray={v === 0 ? '' : '2 4'}/>
          <text x={padL - 10} y={yS(v) + 4} textAnchor="end" fontSize="11"
            fill="#0E0B2C" opacity="0.55" fontFamily="Geist Mono">{fmtTick(v)}</text>
        </g>
      ))}
      {pts.map(p => (
        <text key={p.year} x={xS(p.year)} y={padT + plotH + 22} textAnchor="middle" fontSize="11"
          fill="#0E0B2C" opacity="0.55" fontFamily="Space Grotesk">Y{p.year}</text>
      ))}

      {hasInput && (
        <>
          <path d={`${caPath} L ${xS(years)} ${yS(0)} L ${xS(0)} ${yS(0)} Z`} fill="#D4FF3A" fillOpacity="0.08"/>
          <path d={`${usPath} L ${xS(years)} ${yS(0)} L ${xS(0)} ${yS(0)} Z`} fill="#FF3D7F" fillOpacity="0.10"/>
          <path d={caPath} fill="none" stroke="#D4FF3A" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round"/>
          <path d={usPath} fill="none" stroke="#FF3D7F" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round"/>
          {pts.map(p => (
            <g key={'d'+p.year}>
              <circle cx={xS(p.year)} cy={yS(p.ca)} r="4.5" fill="#D4FF3A" stroke="#0E0B2C" strokeWidth="2.2"/>
              <circle cx={xS(p.year)} cy={yS(p.us)} r="4.5" fill="#FF3D7F" stroke="#0E0B2C" strokeWidth="2.2"/>
            </g>
          ))}
        </>
      )}

      {!hasInput && (
        <text x={padL + plotW / 2} y={padT + plotH / 2} textAnchor="middle"
          fontSize="18" fill="#0E0B2C" opacity="0.4" fontFamily="Space Grotesk">
          your year-by-year shows up here once you fill in the wizard
        </text>
      )}

      {breakeven && (
        <g>
          <line x1={xS(breakeven.year)} y1={padT} x2={xS(breakeven.year)} y2={padT + plotH}
            stroke="#0E0B2C" strokeWidth="1.5" strokeDasharray="4 5" opacity="0.55"/>
          <circle cx={xS(breakeven.year)} cy={yS(breakeven.value)} r="9" fill="#0E0B2C" stroke="#F5EBD3" strokeWidth="3"/>
          <g transform={`translate(${xS(breakeven.year) + 16}, ${yS(breakeven.value) - 30})`}>
            <rect x="0" y="-18" width="148" height="26" rx="13" fill="#0E0B2C"/>
            <text x="74" y="-1" textAnchor="middle" fontSize="11" fill="#FFF6E5"
              fontFamily="Space Grotesk" fontWeight="700" letterSpacing="0.1em">
              BREAKEVEN · YR {breakeven.year.toFixed(1)}
            </text>
          </g>
        </g>
      )}

      {hasInput && (
        <>
          <text x={xS(years) - 6} y={yS(pts[years].ca) - 14} textAnchor="end"
            fontSize="13" fill="#D4FF3A" fontFamily="Space Grotesk" fontWeight="700">
            Stay in Canada
          </text>
          <text x={xS(years) - 6} y={yS(pts[years].us) - 14} textAnchor="end"
            fontSize="13" fill="#FF3D7F" fontFamily="Space Grotesk" fontWeight="700">
            Move to US
          </text>
        </>
      )}
    </svg>
  );
}

            {' '}The numbers all run in your browser; the optional <span className="font-semibold text-night/80">AI explanation</span> in the verdict section is the only feature that sends inputs out (to Anthropic's API).
          </p>
        </div>
      </div>
      <div className="border-t border-night/10">
        <div className="max-w-[1280px] mx-auto px-6 md:px-10 py-5 flex flex-wrap items-center justify-between gap-4">
          <div className="grotesk text-night/40 text-sm">© 2026 · North×South · Mazin Kanuga × Copilot Tax</div>
          <div className="grotesk text-night/40 text-xs">Calculator runs entirely in your browser</div>
        </div>
      </div>
    </footer>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
